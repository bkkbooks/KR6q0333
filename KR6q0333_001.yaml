body:
  text: 參學門人編靈隱弘禮重梓湖州雙髻庵法語師自咸湻甲戌春就庵示眾乃云談玄談妙說性說心攢花簇錦巧妙尖新如麻似粟從古至今莫不皆是乘虗接響底漢倚草附木精靈山僧雖是他家種草決定不向遮裏藏身既然如是且道今日為眾開堂斬新條令一句又作麼生喝一喝云符到奉行示眾有一物明歷歷佛祖覰不破大地無人識常在舌頭尖盡力吐不出吐得出也是胡餅裏呷汁示眾有句無句金烏吞玉兔如藤倚樹癩馬繫枯樁樹倒藤解一冬燒不盡句歸何處石虎當途踞呵呵大笑龍頭蛇尾捺倒爛泥裏剛刀不斬無罪之人且道溈山過在甚麼處乃呵呵大笑下座示眾千嶺萬山雪五湖四海冰清光成一片物物盡皆明且道趙州柏樹子雲門乾矢橛洞山麻三斤畢竟是箇甚麼喝一喝云明星當午現猶待曉雞鳴歲旦示眾百年難遇歲朝春姹女梳粧越樣新惟有東村王大姐依前滿面是埃塵解制示眾九旬把定繩頭不容絲毫走作直得箇箇皮穿骨露九零八落冷眼看來正謂掘地討天千錯萬錯今日到遮裏不免放開一線彼此無拘無束東西南北任運騰騰天上人間逍遙快樂然雖如是且道忽遇鑊湯爐炭劍樹刀山未審如何棲泊良久云惡示眾萬里不挂片雲虗空突出一竅雙髻峰𨁝跳上三十三天拄杖子向十字街頭揚聲大叫且道叫箇甚麼以拂子擊禪牀云炎炎六月火生冰夜半日輪當午照示眾一夏九十日看看又將半面門無位人急著眼睛看冷地驀相逢脚跟紅線斷掌內握乾坤翻身遊碧漢堪笑當年老瑞巖惺惺石上重呼喚乃豎起拂子云大眾遮箇是瑞巖主人公耶是臨濟無位真人耶若也定當得出許你一生參學事畢脫或未然擲下拂子云撒向堦前來朝打算示眾五湖春色十分肥正是功圓果滿時玉蝶穿花零碎錦黃鶯擲柳亂垂絲靈雲打失娘生眼備老重添八字眉無限水邊林下客謾將竹杖度須彌示眾三世諸佛說不到開口道著歷代祖師行不到動步踏著行說俱到時如何正好行脚歲旦示眾山僧去年三十六今年又添一歲諸人共知拈拄杖云且道拄杖子年多少擊禪牀云元正啟祚萬物咸新示眾舉南泉示眾云文殊普賢昨夜三更起佛見法見各與二十棒貶向二鐵圍山所供並實趙州出云棒教阿誰喫泉云過在甚麼處一對無孔鐵槌州便禮拜泉歸方丈蒼天中更添怨苦南泉和尚雖則頂門具眼賞罰分明點檢將來也是虗空裏釘橛若無趙州後語未審如何折合高峰不然忽有人起佛見法見但向他道善哉善哉時節若至其理自彰示眾百千諸佛歷代祖師乃至天下老和尚以拂子擊禪牀一下云總向遮裏墮坑落壍還有跳得出底麼又擊一下云三生六十劫示眾舉丹霞因過一院值凝寒遂於殿中見木佛乃取燒火向院主偶見訶責曰何得燒我木佛霞以杖撥灰云吾燒取舍利主云木佛何有舍利霞云既無舍利更請兩尊再取燒之院主自後眉鬚墮落師拈云丹霞燒木佛為寒所逼豈有他哉院主眉鬚墮落偶爾成文何足疑矣若作佛法商量管取入地獄如箭擲拂子下座示眾歸宗拭却眼睛二祖安心斷臂雲門拶折一足玄沙𡎺破脚指遮一夥隨摟搜漢以拂子云蚤知有遮般消息免見血淋滿地示眾以拄杖橫肩顧左右云大眾會麼楖𣗖橫肩不顧人直入千峰萬峰去杭州西天目山師子禪寺法語至元丁亥冬眾請師開堂遂就石室內拈香祝聖罷次拈香云此一瓣香不假壺中日月亦非劫外春風幾番親遭毒手直得八面玲瓏如今放下也地搖六震拈來則塞破虗空且道不拈不放一句又作麼生喝一喝作女人拜爇向爐中供養前住仰山戴角披毛無鼻孔底老和尚用酬法乳之恩遂就座僧問十方同聚會箇箇學無為此是選佛場心空及第歸龐居士恁麼道還有為人處也無師云有進云畢竟在那一句師云從頭問將來進云如何是十方同聚會師云龍蛇混雜凡聖交參進云如何是箇箇學無為師云口吞佛祖眼蓋乾坤進云如何是選佛場師云東西十萬南北八千進云如何是心空及第歸師云動容揚古路不墮悄然機進云恁麼則言言見諦句句朝宗師云你甚處見得僧喝師云也是掉棒打月進云此事且止只如西峰今日十方聚會選佛場開畢竟有何祥瑞師云山河大地萬象森羅情與無情悉皆成佛進云既皆成佛因甚學人不成佛師云你若成佛爭教大地成佛進云畢竟學人過在甚麼處師云湘之南潭之北進云還許學人懺悔也無師云禮拜著僧纔拜師云師子咬人韓獹逐塊師乃豎拂召大眾云此是選佛場心空及第歸伶俐漢若向遮裏見得便見龐居士安身立命處既見龐居士安身立命處便見從上佛祖安身立命處既見佛祖安身立命處便見自己安身立命處既見自己安身立命處不妨向遮裏拗折拄杖高挂鉢囊三條椽下七尺單前咬無米飯飲不濕羮伸脚打眠逍遙度日若是奴郎不辨菽麥不分抑不得已按下雲頭向虗空裏書一本上大人教諸人依樣畫猫兒去也山僧昔年在雙徑歸堂未及一月忽於睡中疑著萬法歸一一歸何處自此疑情頓發廢寢忘餐東西不辨晝夜不分開單展鉢屙屎放尿至於一動一靜一語一默總只是箇一歸何處更無絲毫異念亦要起絲毫異念了不可得正如釘釘膠粘撼搖不動雖在稠人廣眾中如無一人相似從朝至暮從暮至朝澄澄湛湛卓卓巍巍純清絕點一念萬年境寂人忘如癡如兀不覺至第六日隨眾在三塔諷經次擡頭忽覩五祖演和尚真讚驀然觸發日前仰山老和尚問拖死屍句子直得虗空粉碎大地平沈物我俱忘如鏡照鏡百丈野狐狗子佛性青州布衫女子出定話從頭密舉驗之無不了了般若妙用信不誣矣前所看無字將及三載除二時粥飯不曾上蒲團困時亦不倚靠雖則晝夜東行西行常與昏散二魔輥作一團做盡伎倆打屏不去於遮無字上竟不曾有一餉間省力成片自決之後鞠其病源別無他故只為不在疑情上做工夫一味只是舉舉時即有不舉便無設要起疑亦無下手處設使下得手疑得去只頃刻間又未免被昏散打作兩橛於是空費許多光陰空喫許多生受略無些子進趣一歸何處却與無字不同且是疑情易發一舉便有不待返覆思惟計較作意纔有疑情稍稍成片便無能為之心既無能為之心所思即忘致使萬緣不息而自息六窗不靜而自靜不犯纖塵頓入無心三昧忽遇喫粥喫飯處管取向鉢盂邊摸著匙筯不怕甕中走却鼈此是已驗之方決不相賺如有一句誑惑諸人自招永墮拔舌犂耕現前學般若菩薩必要明此一段大事不憚山高水闊特特來見西峰況兼各各然指然香立戒立願礪齒磨牙辦鐵石志既有如是操略如是知見切須莫負自己初心莫負父母捨汝出家心莫負新建僧堂檀信心莫負國王大臣外護心直下具大信去直下無變異去直下壁立萬仞去直下依樣畫猫兒去畫來畫去畫到結角羅紋處心識路絕處人法俱忘處筆端下驀然突出箇活猫兒來㘞元來盡大地是箇選佛場盡大地是箇自己到遮裏說甚龐居士直饒三乘十地膽喪魂驚碧眼黃頭容身無地然雖如是若要開鑿人天眼目發揚佛祖宗猷更須將自己與選佛場鎔作一團颺在百千萬億世界之外轉身移步向威音那邊更那邊打一遭却來喫西峰痛棒大眾既是和自己颺了又將甚麼喫棒忽有箇不顧性命底漢子聞恁麼舉出來掀倒禪牀喝散大眾是則固是要且西峰師子巖未肯點頭在上堂無邊剎境自他不隔於毫端十世古今始終不離於當念只如山僧每日在張公洞裏橫眠豎眠或歌或詠諸人還知麼諸人每日在選佛場前東行西行或嗔或喜山僧還知麼若也彼此知得不免分身碓搗拔舌犂耕若也彼此不知管取釋迦拱手彌勒歸依因甚如此不見道知之一字眾禍之門上堂萬法歸一一歸何處乃顧視左右下座上堂盡十方世界是箇鉢盂汝等諸人喫粥喫飯也在裏許屙屎放尿也在裏許行住坐臥乃至一動一靜總在裏許若也識得達磨大師只與你做得箇洗脚奴子若也不識二時粥飯將甚麼喫參元正上堂新年頭行新令露柱燈籠急著眼聽竈頭西南角有片方磚惺惺伶俐伶俐惺惺念茲在茲必恭必敬因甚如此徐十三郎行年本命上堂愛之欲其生惡之欲其死愛惡兩重關以拄杖總向遮裏起直饒識得根源更買草鞋行脚三十年以拄杖何曾踏著遮裏擲拄杖云你有拄杖子與你拄杖子上堂卓拄杖云師子窟師子吼師子兒無前後驀然直下翻身便解人前開口即今莫有翻身底麼擲拄杖云鰕跳不出斗結制上堂大限九旬小限七日麤中有細細中有密密密無間纖塵不立正恁麼時銀山鐵壁進則無門退之則失如墮萬丈深坑四面懸崖荊棘切須猛烈英雄直要翻身跳出若還一念遲疑佛亦救你不得此是最上玄門普請大家著力山僧雖則不管閒非越例與諸人通箇消息因從一禪人有省上堂二十餘年布箇縵天網子打鳳羅龍竟不曾遇著一箇鰕蟹今日不期有箇蟭螟蟲撞入網中固是不堪上眼三十年後向孤峰絕頂揚聲大叫且道叫箇甚麼大地山河一片雪上堂昨夜夢中作得一偈舉似大眾良久云忘却了也驀拈拄杖云拄杖子還記得麼良久云同坑無異土浴佛上堂舉世尊纔生下乃一手指天一手指地周行七步目顧四方云天上天下惟吾獨尊師云見怪不怪其怪自壞大眾會麼更聽一頌指天指地展戈矛直至如今戰不休假使羣靈都殺盡一身還有一身愁祈晴上堂天關久鎖不開容日夜滂沱鼓黑風以拂子擊禪牀一下云憤性一槌俱擊碎頂門迸出一輪紅中夏上堂以拂子四十五日前薦得非特日消萬兩黃金亦乃能應四天下供養四十五日後薦得寸絲滴水也當牽犁拽杷償他以拂子擊禪牀一下云曾經巴峽猿啼處不是愁人也斷腸上堂忘却當年密授句枉教一眾喫辛苦夜來枕上忽憶著年年五月黃梅雨上堂一葉落天下秋一塵起大地收喝一喝云有意氣時添意氣不風流處也風流上堂海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句內有一句能殺能活能縱能奪若檢點得出許汝一生參學事畢直翁居士至上堂山僧有一奇特因緣未甞輕易拈出今日幸遇直翁證明供養大眾良久云美食不中飽人餐冬至上堂陰向鼻端滅陽從眼裏生會得箇中意更參三十年上堂夜夜抱佛眠上大人朝朝還共起丘乙己起坐鎮相隨化三千語默同居止七十士纖毫不相離爾小生如身影相似八九子欲識佛住處佳作仁只遮語聲是可知禮也傅大士和聲吐出耀古騰今妙上座矢上加尖一場好笑伶俐漢纔聞舉著如珠在掌如芥投針若是機思遲鈍三搭不回昔年吾佛世尊由斯之輩三七思惟計盡情忘不免全身放倒今日山僧到遮裏也只得依條攀例按下雲頭倒轉鎗旗就窠打劫直教一箇箇不假乘舟鼓棹游戲如來大圓覺海以拂子打圓相云還見麼以拂子擊禪牀一下云還聞麼蒼天蒼天正所謂有耳不聞圓頓教有眼不見舍那身說甚長期短期百千萬億阿僧祇鼻孔依前向下垂擲下拂子喝一喝下座普請上堂禪不在參道不須悟動轉施為山嶽鼓舞孟八郎漢便恁麼去爭似西峰搬石運土上堂昨夜東西兩天目議論狗子有無佛性話儘儘爭之不已山僧未免出來向他道說有說無總未夢見在於是二邊懡㦬而退大眾既謂有無俱不是畢竟合作麼生八角磨盤空裏走三脚驢子弄蹄行因事上堂水中鹹味色裏膠青決定是有不見其形豎拂子云見其形失却山前一村人眼睛上堂八十日中千說萬喻說也說到無說時聞也聞到無聞處既是無說又無聞功成果滿憑何舉吹龍笛擊鼉鼓皓齒歌細腰舞桃花亂落如紅雨結制上堂西峰今年結夏有一奇特事不得不告報諸人且道是甚奇特事龍蛇混雜凡聖同居上堂大海無魚大地無草大富無糧大悟無道若人透此四重關非特親見高峰眉毛長短鼻孔淺深猶如赫日當空萬別千差無不照雖然喚作拂子則觸不喚作拂子則背畢竟喚作甚麼中夏上堂豎拂子召大眾云到遮裏進前一步也不得退後一步也不得總不恁麼也不得畢竟如何不得不得解制上堂布袋頭開餧驢餧馬要騎便騎要下便下若到江西湖南撞著焦尾大蟲切莫道在西峰度夏上堂喫粥了也洗鉢盂去矢上加尖一場敗露西峰今日忍俊不禁却要向鷺鷥腿上割股良久云便恁麼去開爐上堂豎起拂子云遮些火種自靈山傳至西峰已得二千二百三十餘載今日幸遇開爐特為諸人拈出以拂子吹一吹乃擲下云照顧燒却眉毛冬至上堂良久云一陽來復萬物咸新恭惟盲龜跛鼈鬼怪妖精莫問前長後短大家扶起破沙盆臘八上堂黃面瞿曇夜半成道正是喚奴作郎嬴得一場好笑山僧恁麼告報也是細姑嫌嫂晚參參須實參悟須實悟動轉施為輝今耀古若是操心不正悟處不真粧粧點點鬬鬬釘釘被人輕輕拶著未免喚燈籠作露柱且道如何是實參實悟底消息良久云南山起雲北山下雨上堂西峰今日啟建圓覺長期有四件切要事告報大眾第一不得隔壁聽聲第二不得暗裏偷光第三不得指東話西第四不得閙中取靜汝等諸人誠能遵行此令管取剋日成功超凡入聖若也不然縱歷阿僧祇敢道未徹在上堂舉鵝湖和尚示眾云未了底人長時浮逼逼地設使了得底人明得知有去處尚乃浮逼逼地上大人丘乙己雲門舉問首座云適來和尚道未了底人浮逼逼地了得底人浮逼逼地意作麼生座云浮逼逼地可知禮也門云首座在此頭白齒黃作遮箇語話曲則全座云上座作麼生門云要道即得見即便見若不見莫亂道枉則直座云只如堂頭和尚道浮逼逼地又作麼生門云頭上著枷脚下著杻重言不當喫座云恁麼則無佛法也親言出親口門云此是文殊普賢大人境界是何言歟二老披肝歷膽西峰雪上加霜還見鵝湖也無若道見端的在那一句若道不見誵訛在甚麼處具眼底試點出看冬至上堂世間動不動法皆屬陰陽遷變驀拈拄杖云惟有山僧木上座能為萬象主不逐四時彫乃靠拄杖云無形本寂寥上堂低頭覓天仰面尋地波波挈挈遠之遠矣驀然撞著徐十三郎嗄元來只在遮裏以手拍膝一下云在遮裏臘月三十日到來也是開眼見鬼上堂舉香嚴和尚一日上堂時有僧問不慕諸聖不重己靈如何嚴云萬機休罷千聖不𢹂臘月扇子此時疏山在眾作嘔聲曰是何言歟低聲低聲嚴云阿誰眾曰師叔嚴云不肯老僧那出云是胡來胡現嚴云汝莫道得麼山曰道得平地干戈嚴云汝試道看山云若教某甲道須還師資禮始得赤眼撞著火柴頭嚴乃禮拜舉前話問之山曰何不道肯諾不得全草賊大敗嚴云直饒恁麼道也須倒屙三十年設使住山無柴燒近水無水喫分明記取棒打石人頭嚗嚗論實事後住疏山果如前記大眾二老互相屈辱西峰從頭解注還分優劣也無若謂不分因甚倒屙三十年若謂分漏逗在甚麼處伶俐漢緇素得出非惟截斷天下人舌頭穿却天下人鼻孔釋迦彌勒與你作奴亦不為差其或不然更聽一頌洞徹是非如夢幻轉身未免墮深坑須知別有通霄路不許時人造次行上堂拈拄杖召大眾云還見麼人人眼裏有睛不是瞎漢決定是見以拄杖卓一下云還聞麼箇箇耳裏有竅不是死漢決定是聞既見既聞是箇甚麼以拄杖見聞即且止只如六根未具之前聲色未彰之際未聞之聞未見之見正恁麼時畢竟以何為驗以拄杖吾今與汝保任斯事終不虗也以拄杖三十年後切忌妄通消息靠拄杖下座雪巖和尚忌拈香昔年瞎却我眼今朝穿却你鼻冤冤相報無休莫若克己復禮遂插香以袖掩面作哭聲復以坐具搭左肩上作女人拜云非惟和尚同塵免得遞相鈍置上堂一年已減五日光影如駒過隙直須如救頭然切莫隨情放逸卓拄杖云夜來一雨雪消鎔萬疊青山如洗出元宵上堂參禪須是鐵漢著手心頭便判只如雪覆千山孤峰不白作麼生判擲拄杖云上元定是正月半上堂舉百丈和尚問溈山云併却咽喉唇吻道將一句來山云却請和尚道師拈云大小溈山推惡離己今日忽有人問西峰併却咽喉唇吻道將一句來即向他道柴荒米貴忍飢無暇祗對佛涅槃上堂周行七步猶成跡槨示雙趺豈易收微雨灑花千點泪淡烟籠竹一堆愁晚參身貧道貧無法可親一味盲枷瞎棒聞者見者莫不生嗔卓拄杖云黃金自有黃金價終不和沙賣與人結制上堂西峰今年結夏全然不成保社一日兩頭薄粥大家忍飢無暇雖有真如佛性菩提涅槃和聲擲拄杖云權且颺在師子巖下上堂終日著衣未甞挂一縷絲終日喫飯未甞咬一粒米既然如是且道即今身上著底每日口裏喫底是箇甚麼到遮裏不論明與不明徹與不徹寸絲滴水也當牽犂拽杷償他何故一片白雲橫谷口幾多歸鳥自迷巢上堂若論此事只要當人的有切心纔有切心真疑便起真疑起時不屬漸次直下便能塵勞頓息昏散屏除一念不生前後際斷纔到遮般時節管取推門落臼若是此念不切真疑不起饒你坐破蒲團百千萬箇依舊日午打三更上堂迷中有悟悟復還迷直須迷悟兩忘人法俱遣衲僧門下始有語話分大眾既是迷悟兩忘人法俱遣共語話者復是阿誰速道速道上堂諸方拈槌豎拂接物利生祇解指虗空說虗空指燈籠露柱說燈籠露柱於是藥頭無驗誤人多矣西峰要向未有虗空名字以前說虗空未有燈籠露柱以前說燈籠露柱要使聞者見者𡎺著磕著一得永得一證永證大眾未有名字以前畢竟憑何施設以拂子擊禪牀一下又連擊兩下上堂日正暄春已暮落花片片隨流去拈拄杖云拄杖枝頭一點紅馨香徧界無人顧大眾顧不顧即且止畢竟一歸何處擲拄杖下座解制上堂一夏以來諸人懡㦬山僧亦懡㦬懡㦬逢懡㦬彼此無空過今朝聖制告圓不免更說些懡㦬禪嬴得大家俱懡㦬如何是懡㦬禪咄猛火著油煎除夜小參一年三百六十日看看逗到今宵畢十箇有五雙參禪禪又不知學道道亦不識只遮不知不識四字正是三世諸佛骨髓一大藏教根源伶俐漢纔聞舉著如龍得水似虎靠山天上人間縱橫無礙然雖如是點檢將來猶是遮邊底消息若謂那邊更那邊一著子直饒西天四七唐士二三以至天下老古錐敢保未徹在山僧與麼告報忽有箇漢子心憤憤口悱悱出來道高峰高峰你有甚長處開得遮般大口只向他道來年更有新條在惱亂春風卒未休直翁居士施僧鞋上堂以手指云以此施者入無間獄受此施者亦入無間獄施者受者既遭此報汝等諸人還知利害處麼以手合掌云難消結制上堂封却拄杖頭結却布袋頭大家團欒頭赤眼火柴頭嗄正是冤家共聚頭不妨頭上更安頭以拄杖打散中夏上堂前四十五日何處去焦尾大蟲入閙市後四十五日何處來三脚驢子上高臺俊鷹快便合乘時跛鼈盲龜徒勞𨁝跳上堂今年一期有五件好事特為諸人分明揭示第一好僧堂第二好後架第三好知事第四好廚堂第五好衲子若作佛法商量掉棒打月若作世諦流布接竹點天畢竟合作麼生師子巖有箇焦尾大蟲夜來惡發被山僧劈脊一棒化為微塵却借陳如尊者四大五蘊以為出入游戲之具你一隊瞌睡漢驢年也未夢見在喝一喝下座上堂舉風穴和尚因真園頭同念法華問訊次穴問真云如何是世尊不說說迦葉不聞聞真云鵓鳩樹上啼穴云你作許多癡福作麼何不體究言句又問念法華云你作麼生念云動容揚古路不墮悄然機穴却顧真園頭云你何不看念法華下語念自茲印可名振四方師云山僧昔年侍立先師次亦甞被問此話擬下語間遂遭一頓熱棒打出直得三日忍痛不已大眾端的要見二老優劣但將妙上座喫棒處看雪巖和尚忌拈香巴陵設忌三轉語西峰單單只一句且道是那一句聻遂插香云逢人切忌錯舉上堂舉凌行婆問浮杯盡力道不得底句分付阿誰杯云浮杯無剩語婆云未到浮杯不妨疑著杯云更有長處不妨拈出婆斂手哭云蒼天中更添怨苦杯無語婆云語不知偏正理不識倒邪為人則禍生後有僧舉似南泉泉云苦哉浮杯被遮老婆摧折一上婆聞得笑云王老師猶少機關在時有幽州澄一禪客詣婆乃問南泉為甚少機關婆哭云可悲可痛澄一罔措婆云會麼一合掌而立婆云跂死禪和如麻似粟後澄一舉似趙州州云我若見遮臭老婆問教伊口啞一云未審和尚作麼生問伊州便打一云為甚却打某甲州云似遮般跂死禪和不打更待何時婆聞却云趙州合喫婆手中棒州聞得哭云可悲可痛婆聞乃歎云趙州眼光爍破四天下州聞得令人去問云如何是趙州眼婆乃豎起拳僧回舉似趙州州乃有頌與婆云當機覿面提覿面當機報爾凌行婆哭聲何得失婆有頌答云哭聲師已曉已曉復誰知當時摩竭令幾喪目前機師拈云山僧始者一看將謂總是白拈賊及乎再辨端倪却有浮杯較些子何故不因漁父引爭得見波濤佛誕上堂指天指地一棒打殺鴆屎砒霜合造毒藥颺在三千世界中不知那箇親遭著卓拄杖一下結制上堂西峯結制不尋常穀滿倉兮僧滿堂既得遮些根蒂固大家搖扇取風涼上堂門外有一人用盡機謀要入入不得門裏有一人做盡伎倆要出出不得出不得入不得即且置且道門外人與門裏人相見時如何愁人莫向愁人說說向愁人愁殺人開爐上堂三千世界作爐百億須彌為炭生鐵鑄就禪和炙得通身紅爛正恁麼時莫有躲得過底麼左右顧視云嗄將謂水不能溺火不能焚元來總是一隊爛額焦頭漢上堂十五日已前𣯧𣯧魍魍魎魎十五日已後巍巍堂堂煒煒煌煌正當十五日虗空為鼓須彌為槌輕輕擊動佛祖攢眉即今莫有解擊底麼以拂子擊禪牀云若將耳聽應難會眼處聞聲方始知薦亡上堂入我法中不論凡聖動轉施為咸遵舊令要明少室格外新條驀拈拄杖云未免借伊鼻孔出氣卓拄杖云開甘露門劃一畫云示甘露味大地眾生頓超十地惟有今辰覺成上座營齏報薦考妣二位亡靈不在其內何故擲拄杖云分明一對黃金骨不必栴檀入細雕留兩班上堂九旬把定重關今朝放開一線頂門具眼衲僧自合知機識變乃展手云依舊平分局面復舉靈雲見桃花悟道刺腦入膠盆溈山道從緣入者永無退失咬牙封雍齒玄沙道諦當甚諦當敢保老兄未徹在泣淚斬丁公伶俐漢直饒向遮裏見得更買草鞋行脚三十年却來喫西峰痛棒上堂一不成二不是紅底桃白底李紅紅白白不相瞞因甚達磨大師被流支三藏打落當門齒通寧智顏菴主送法被至上堂裁蜀錦翦吳綾披白玉間黃金打成一片時針劄不入羅紋結角處線路難尋雖然只如西峰以諸法空為座以拄杖指被云還著得遮箇麼靠拄杖云天香影散莓苔石五葉花開薝蔔林結制上堂一百禪和三十州無繩自縛萬山頭誰是護生誰是殺白雲影裏鐵船浮上堂舉雪峰因僧來參峰問甚處來僧云浙中來峰云船來陸來僧云二途俱不涉峰云爭得到遮裏僧云有甚麼隔礙峰打趁出僧後十年再來峰云甚處來僧云湖南來峰云湖南與此間相去多少僧云不隔峰舉拂云還隔遮箇麼僧云若隔爭得到遮裏峰亦打出僧住後每見人必罵雪峰同行聞特去相訪遂問你因甚罵雪峰遮僧舉前兩段因緣同行痛罵與伊點破遮僧遂悲泣每於中夜焚香望雪峰禮拜師拈云遮箇公案頗類德山托鉢話諸方商量者極多錯會者亦不少具眼底但於德山低頭處見得便會雪峰打意於巖頭不肯處見得便會遮僧罵意又於巖頭密啟處見得便會同行點破意於巖頭撫掌處見得便會遮僧悲泣意又於巖頭受記處見得便會遮僧遙禮意西峰今日將二老父父子子縛作一束拋在諸人面前了也諸人要見二老則易要見西峰則難何故有眼無耳垛六月火邊坐晚參萬法歸一一歸何處狹路相逢兩手分付逴得便行黃河三千年一度清上堂意句不到宗說不通盲龜跛鼈意句俱到宗說俱通盲龜跛鼈西峰恁麼告報莫有離此之外別有生涯底麼盲龜跛鼈佛誕上堂呱聲未絕便稱尊攪得三千海嶽昏惡水一年澆一度知他雪屈是酬恩妙湛無為長老至上堂舉劉鐵磨來參溈山把髻投衙山云老牸牛汝來也引狗入寨磨云來日臺山大會有齋和尚還去麼癩免牽伴溈山作臥勢隨邪逐惡磨便出咄直饒逴得便行也是韓獹逐塊冬至舉僧問古德云一陽來復日長一線未審佛法長多少德云長一線後又有古德云一線長師拈云就窠打劫還他二老本分鉗鎚若謂佛法短長端的未夢見在今日忽有人問西峰佛法長多少只向他道東西十萬南北八千薌林居士至上堂此事如欲登天目大山相似未到山時不免蘊一座山於八識田中洎至一到所蘊之山恍焉消殞因甚如此豎起拂子云只緣身在此山中復舉老子道湛兮似或存吾不知其誰之子象帝之先師拈云咄哉遮漢錯下注脚湛兮似或存吾不知其誰之子毗耶城裏老維摩上堂舉雲門大師到乾峰云請師答話含血噴人先汙自口峰云到老僧也未赤眼撞著火柴頭門云恁麼那恁麼那河裏失錢河裏摝峰云將謂猴白更有猴黑好手手中呈好手紅心心裏中紅心雪巖和尚忌拈香阿師示寂來彈指恰八載將謂入黃泉面目儼然在大眾面目既在拈起香云莫是遮箇麼插香云認著依前猶隔海上堂工夫不到不方圓寬著程途急著鞭但得此心常不昧從教滄海變桑田解制上堂識得拄杖子被拄杖子縛不識拄杖子亦被拄杖子縛卓拄杖云不是弄潮人徒勞遭點額復舉金陵則監寺初參青峰問云如何是學人自己峰云丙丁童子來求火後謁法眼眼云曾見甚麼人來則云青峰來眼云有何言句則舉前話眼云上座作麼生會則云丙丁屬火以火覓火如將自己覓自己眼云恁麼會又爭得則云某甲只恁麼和尚作麼生眼云汝問我我與汝道則云如何是學人自己眼云丙丁童子來求火則於言下頓悟師拈云遮則公案自古至今覓箇不錯會底人如星中揀月相似只如則監寺於法眼言下悟去要且不是順朱具眼底試辨看重陽上堂大抵登高直須親到萬山之頂若不到頂爭知宇宙之寬即今莫有到頂者麼良久云土曠人稀相逢者少復舉慈明和尚每室中以水一盆上劄一口劍下著一緉草鞋膝上橫按拄杖凡有僧入門便指纔擬便棒師拈云大小慈明勞而無功西峰不動一鎗一旗從教𠒎短鶴長何故年年九月九徧地菊花香上堂舉永首座同慈明辭汾陽後相從二十年不得休歇一夕圍爐夜深明以火筯敲炭召云永首座永首座永咄云野狐精明以手指云訝郎當漢又恁麼去永於言下頓悟師拈云遮箇公案若曰依條直斷慈明無端坑陷平人合喫三十棒永首座不合隨風倒柂亦當代喫十棒忽有箇抱不平底出來道西峰聻則向他道心不負人面無慚色雪巖和尚忌拈香咄哉老賊偷心未息石灰布袋到處成跡若謂子為父隱畢竟曲不藏直今日因齋慶讚未免乘時拈出上堂一年又過一月今日又從頭起循環烏兔如梭百年光陰有幾以拄杖卓一下云諸上座休瞌睡直饒火急翻身四大海水早已傾在汝耳裏結制上堂今年龍象頗多權作三堂結夏雖然名字不同是法本無高下中間有箇肉身菩薩現與諸人同結同修同眠同坐若也點檢得出說甚黃面瞿曇西來達磨不然且待七月十五却與諸人說破復舉僧問雲門如何是諸佛出身處門云東山水上行又僧問圓悟如何是諸佛出身處悟云薰風自南來殿閣生微涼師拈云二老雖具頂門正眼慤其本源天地懸隔上堂資生貴圖求富參禪貴圖求悟求悟若學資生箇箇成佛作祖咄甜瓜徹蒂甜苦瓠連根苦復舉僧於馬祖前作四畫上一畫長下三畫短云不得道長不得道短離四句答某甲始得祖乃畫一畫云不得道長不得道短答汝了也後僧舉似忠國師師云何不問我師拈云字經三寫烏焉成馬西峰忍俊不禁特為諸人改正去也召侍者云分明記取上堂舉僧問長慶眾手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在師拈云西峰不然今日忽有人問眾手淘金誰是得者只向他道阿誰無分又云學人還得也無猶嫌少在上堂千疑萬疑祇是一疑若能決此一疑免教節上生枝即今莫有決得底麼若也決得賞你一錠金若決不得亦賞你一錠金何故豈不見道至道無難惟嫌揀擇復舉僧問法眼聲色二字如何透得法眼召大眾云若會得遮僧問處透聲色也不難師拈云明修棧道暗度陳倉解制上堂拈拄杖卓一下云打開布袋頭放出百千牛縱隨芳草去終不被人收一日歸來重會面半含容笑半含羞大眾羞即且止畢竟笑箇甚麼又卓一下云休復舉芙蓉一日告辭馬祖祖云裝却包了來與你說一上佛法芙蓉於次日至方丈侍立少頃祖云時寒善為道路芙蓉至法堂上忽然有省師拈云馬祖佛法恁麼流布拈花微笑命若懸絲今日凡有人來告辭總與草鞋一緉上堂今朝八月一行脚禪和出不識自家珍却向途中覓直饒走徧一百一十城參見五十三善知識功超十地三乘位等釋迦彌勒若還來到西峰未免一棒打折你驢脊起期上堂山僧久病服藥不瘳大眾久參於心不悟所以病到筋斷骨折處參到情窮理極時一一檢點將來全無些子靈驗記得去年有一則未了公案今日擬循舊例別剏新條以八十日劃地為牢要諸人各各通箇口欵不得將無作有不得指東話西不得舉意博量不得擬心湊泊若有箇不顧性命底漢向事未著罪未彰以前一欵盡招西峰拄杖子當為伊據欵結案辭眾西峰三十年妄談般若罪犯彌天末後有一句子不敢累及平人自領去也大眾還有知落處者麼良久云毫釐有差天地懸隔示禪人三世諸佛歷代祖師留下一言半句惟務眾生超越三界斷生死流故云為一大事因緣出現於世若論此一大事如馬前相撲又如電光影裏穿針相似無你思量解會處無你計較分別處所以道此法非思量分別之所能解是故世尊於靈山會上臨末梢頭將三百六十骨節八萬四千毛竅盡底掀翻雖有百萬眾圍繞承當者惟迦葉一人而已信知此事決非草草若要的實明證須開特達懷發丈夫志將從前惡知惡解奇言妙句禪道佛法盡平生眼裏所見底耳裏所聞底莫顧危亡得失人我是非到與不到徹與不徹發大忿怒奮金剛利刃如斬一握絲一斬一切斷一斷之後更不相續直得胸次中空勞勞地虗豁豁地蕩蕩然無絲毫許滯礙更無一法可當情與初生無異喫茶不知茶喫飯不知飯行不知行坐不知坐情識頓淨計較都忘恰如箇有氣底死人相似又如泥塑木雕底相似到遮裏驀然脚蹉手跌心華頓發洞照十方如杲日麗天又如明鏡當臺不越一念頓成正覺非惟明此一大事從上若佛若祖一切差別因緣悉皆透頂透底佛法世法打成一片騰騰任運任運騰騰灑灑落落乾乾淨淨做一箇無為無事出格真道人也恁麼出世一番方曰不負平生參學之志願耳若是此念輕微志不猛利𣯧𣯧魍魍魎魎今日也恁麼明日也恁麼設使三十年二十年用工一如水浸石頭相似看看逗到臘月三十日十箇有五雙懡㦬而去致令晚學初機不生敬慕似遮般底漢到高峰門下打殺萬萬千千有甚麼罪過今日我之一眾莫不皆是俊鷹快如龍若虎舉一明三目機銖兩豈肯作遮般體態兀兀度時然雖如是正恁麼時畢竟喚甚麼作一大事若也道得與汝三十拄杖若道不得亦與三十拄杖何故卓拄杖一下云高峰門下賞罰分明兄弟家十年二十年以至一生絕世忘緣單明此事不透脫者病在於何本分衲僧試拈出看莫是宿無靈骨麼莫是不遇明師麼莫是一暴十寒麼莫是根劣志微麼莫是汩沒塵勞麼莫是沈空滯寂麼莫是雜毒入心麼莫是時節未至麼莫是不疑言句麼莫是未得謂得未證謂證麼若論膏肓之疾總不在遮裏既不在遮裏畢竟在甚麼處咄三條椽下七尺單前若論此事如大火聚烈𦦨亘天曾無少間世間所有之物悉皆投至猶如片雪點著便消爭容毫末若能恁麼提持剋日之功萬不失一倘不然者縱經塵劫徒受勞矣若論此一段奇特之事人人本具箇箇圓成如握拳展掌渾不犯纖毫之力祇為心猿擾擾意馬喧喧恣縱三毒無明妄執人我等相如水澆冰愈加濃厚障却自己靈光決定無由得現若是生鐵鑄就底漢的實要明亦非造次直須發大志立大願殺却心猿意馬斷除妄想塵勞如在急水灘頭泊舟相似不顧危亡得失人我是非忘寢忘餐絕思絕慮晝三夜三心心相次念念相續劄定脚頭咬定牙關牢牢把定繩頭更不容絲毫走作假使有人取你頭除你手足剜你心肝乃至命終誠不可捨到遮裏方有少分做工夫氣味嗟乎末法去聖時遙多有一等泛泛之流竟不信有悟門但只向遮邊穿鑿那邊計較直饒計較得成穿鑿得就眼光落地時還用得著也無若用得著世尊雪山六年達磨少林九載長慶坐破七箇蒲團香林四十年方成一片趙州三十年不雜用心何須討許多生受喫更有一等成十年二十年用工不曾有箇入處者只為他宿無靈骨志不堅固半信半疑或起或倒弄來弄去世情轉轉純熟道念漸漸生疏十二時中難有一箇時辰把捉得定打成一片似遮般底直饒弄到彌勒下生也有甚麼交涉若是真正本色行脚高士不肯胡亂打頭便要尋箇作家纔聞舉著一言半句更不擬議直下便恁麼信得及作得主把得定孤迥迥峭巍巍淨躶躶赤灑灑更不問危亡得失只恁麼捱將去驀然繩斷喫攧絕後再甦看他本地風光何處更覓佛矣又有一偈舉似大眾急水灘頭泊小舟切須牢把遮繩頭驀然繩斷難迥避直到通身血迸流生死事大無常迅速生不知來處謂之生大死不知去處謂之死大只遮生死一大事乃是參禪學道之喉襟成佛作祖之管轄三世如來恒沙諸佛千變萬化出現世間蓋為此生死一大事之本源西天四七唐土二三以至天下老和尚出沒卷舒逆行順化亦為此一大事之本源諸方禪衲不憚勞苦三十年二十年撥草瞻風磨裩擦袴亦為此一大事之本源汝等諸人發心出家發心行脚發心來見高峰晝三夜三眉毛撕結亦為此一大事之本源四生六道千劫萬劫改頭換面受苦受辛亦是迷此一大事之本源吾佛世尊捨金輪王位雪山六年苦行夜半見明星悟道亦是悟遮一大事之本源達磨大師入此土來少林面壁九載神光斷臂於覓心不可得處打失鼻孔亦是悟遮一大事之本源臨濟遭黃檗六十痛棒向大愚肋下還拳亦是悟遮一大事之本源靈雲桃花香嚴擊竹長慶捲簾玄沙𡎺指乃至從上知識有契有證利生接物總不出悟遮一大事之本源多見兄弟家雖曰入此一門往往不知學道之本源不能奮其志因循度日今來未免葛藤引如上佛祖入道之因及悟道之由以為標格晚學初機方堪趣向且道如何趣向不見古人道若要脫生死須透祖師關畢竟將甚麼作關喚作竹篦則觸不喚作竹篦則背不得有語不得無語若向遮裏著得一隻眼覰得破轉得身通得氣無關不透無法不通頭頭示現物物全彰無邊剎境自他不隔於毫端十世古今始終不離於當念所以水潦和尚見馬大師禮拜起擬伸問間被馬祖攔胸一踏踏倒起來呵呵大笑云百千法門無量妙義總向一毫頭上識得根源去德山見龍潭向吹滅紙燭處豁然大悟次日遂將疏鈔於法堂上爇云窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑到遮裏有甚麼禪道可參有甚麼佛法可學有甚麼生死可脫有甚麼涅槃可證騰騰任運任運騰騰臘月三十日到來管取得大自在去住自由故云自從認得曹溪路了知生死不相干然雖如是豎拂子云且道遮箇是生耶是死耶若也道得便可向無佛處稱尊無法處說法其或未然山僧不懼羞慚更與諸人露箇消息擲下拂子云夜冷魚潛空下釣不如收卷過殘年兄弟家成十年二十年撥草瞻風不見佛性往往皆謂被昏沈掉舉之所籠殊不知只遮昏沈掉舉四字當體即是佛性堪嗟迷人不了妄自執法為病以病攻病致使佛性愈求愈遠轉急轉遲設使一箇半箇回光返照直下知非廓然藥病兩忘眼睛露出洞明達磨單傳徹見本來佛性若據西峰點檢將來猶是生死岸頭事若曰向上一路須知更在青山外若論此事正如逆水撑船上得一篙退去十篙上得十篙退去千篙愈撑愈退退之又退直饒退到大洋海底掇轉船頭決欲又要向彼中撑上若具遮般操志即是到家消息如人上山各自努力若論此事如萬丈深潭中投一塊石相似透頂透底了無絲毫間隔誠能如是用工如是無間一七日中若無倒斷妙上座永墮阿鼻地獄法門廣無邊參禪第一義若真師子兒不入他羣隊直下便翻身諸獸皆迴避毗盧頂上行生死海中戲佛祖不知名眾魔爭敢邇奇哉此妙門寂寞無人思若有發初心須具大根器內外絕諸緣屏心立堅志譬如人架屋先須實基址基實屋無傾志堅道成易提箇趙州無截斷有無意豎起鐵脊梁急著眼睛覰密密與緜緜絲毫無間棄譬如人倒懸念念更無異日夜苦思量一心求脫離不分東與西寢食都忘記又如初生兒呼喚渾不視用工到那時如人鑽火燧漸見黑黃烟知火必在此切莫顧危亡更須加猛利直待火星飛通身是𦦨熾余雖不會禪也曾恁麼試只在剎那間可立而待至頂門眼豁開裂破娘生鼻海竭須彌崩虗空撲落地十方賢聖師盡是眼中刺微笑與拈花可煞不知愧更有葛藤根一千七百事嗚呼後代人盡食他殘饐若更問如何拳頭劈口捶十二時中四威儀內寶劍全提如臨大陣纔有絲毫念起當急剉之一斷永斷莫令再續若能如是用工管取干戈永息天下太平有志之士思之遵之夜後參前遞相警勵此事的要剋日成功如善射者仰箭射空復以後箭射前箭筈筈筈承箭箭箭中筈首尾相資上下貫串住於空中經久不墮蓋是精進之功決非神力所致凡學般若菩薩亦復如是汝等應當精進如彼射空正恁麼時莫有善射底麼以拂作彎弓勢云看箭參禪一著莫遲疑念念如同救火時烈𦦨亘天渾不顧翻身直造萬重圍一朝火滅烟消後鼻孔依前向下垂如人負重過急流溪行至中間忽遇黑風暴雨其水愈急其水愈深退亦不能進亦不能擬議之間喪身失命正恁麼時合作麼生參若論參禪之要不可執蒲團為工夫墮於昏沈散亂中落在輕安寂靜裏總皆不覺不知非惟虗喪光陰難消施主供養一朝眼光落地之時畢竟將何所靠山僧昔年在眾除二時粥飯不曾上蒲團只是從朝至暮東行西行步步不離心心無間如是經及三載曾無一念懈怠心一日驀然踏著自家底元來寸步不曾移若謂著實參禪決須具足三要第一要有大信根明知此事如靠一座須彌山第二要有大憤志如遇殺父冤讐直欲便與一刀兩段第三要有大疑情如暗他做了一件極事正在欲露未露之時十二時中果能具此三要管取剋日成功不怕甕中走鼈苟闕其一譬如折足之鼎終成廢器然雖如是落在西峰坑子裏也不得不救咄若論此事無尊無卑無老無少無男無女無利無鈍故我世尊於正覺山前臘月八夜見明星悟道乃言奇哉眾生具有如來智慧德相又云心佛及眾生是三無差別又云是法平等無有高下既無差別亦無高下從上佛祖古今知識乃至天下老和尚有契有證有遲有速有難有易畢竟如何譬如諸人在此各各有箇家業驀然一日圓光返照思憶還原或有經年而到者或有經月而到者或有經日而到者或有頃刻而到者又有至死而不到者蓋離家有遠近之殊故到有遲速難易之別然雖如是中問有箇漢子無家業可歸無禪道可學無生死可脫無涅槃可證終日騰騰任運任運騰騰若他點檢得出釋迦彌勒與你提瓶挈鉢亦不為分外苟或不然以拂子擊禪牀兩下喝兩喝云若到諸方切忌錯舉此事譬如人家屋簷頭一堆搕𢶍相似從朝至暮雨打風吹直是無人覰著殊不知有一所無盡寶藏蘊在其中若也拾得百劫千生取之無盡用之無竭須知此藏不從外來皆從你諸人一箇信字上發生若信得及決不相誤若信不及縱經塵劫亦無是處普請諸人便恁麼信去免教做箇貧窮乞兒且道此藏即今在甚處良久云不入虎穴爭得虎子萬法歸一一何歸只貴惺惺著意疑疑到情忘心絕處金烏夜半徹天飛若窮此事用工極際正如空裏栽花水中撈月直是無你下手處無你用心處往往纔遇遮境界現前十箇有五雙打退鼓殊不知正是到家底消息若是孟八郎漢便就下手不得處用心不及時猶如關羽百萬軍中不顧得喪直取顏良誠有如是操略如是猛利管取彈指收功剎那成聖若不然者饒你參到彌勒下生也只是箇張上座有時熱閧閧有時冷冰冰有時如牽驢入井有時如順水張帆因此四魔更相殘害致使學人忘家失業西峰今日略施一計要與諸人掃蹤滅跡良久云捷若論此事如登萬仞之山一步一步將搆至頂惟有數步壁絕攀躋到遮裏須是箇純鋼打就底捨命𢬵身左捱右捱捱來捱去以上為期縱經千生萬劫萬難千魔此心此志愈堅愈強若是根本不實泛泛之徒何止望崖管取聞風而退矣示直翁居士終日共談不二未嘗舉著一字復問此意如何不免遞相鈍置父母非我親誰是最親者盲龜跛鼈靈利漢向遮裏薦得便見無邊剎境自他不隔於毫端十世古今始終不離於當念其或未然不妨撇轉機輪便就盲龜跛鼈上著些精彩起箇疑情疑來疑去直教內外打成一片終日無絲毫滲漏鯁鯁於懷如中毒藥相似又若金剛圈栗棘蓬決定要吞決定要透但盡平生伎倆憤將去自然有箇悟處假使今生吞透不下眼光落地之時縱在諸惡趣中不驚不怖無拘無絆設遇閻家老子諸大鬼王亦皆拱手何故蓋為有此般若不思議之威力也然則有諸現業畢竟般若力勝如箇金剛幢子鑽之不入撼之不動世人出於豪勢門牆亦復如是一切官屬吏卒無不畏之又若擲物墮地重處先著目即雖有成住壞空之相如龍脫殻如客旅居其實本主無生無滅無去無來無增無減無老無少自無始劫來至於今生頭出頭沒千變萬化未嘗移易絲毫許堪嗟一等學人往往多認遮箇識神不求正悟不脫生死置之莫論今生既下此般若種子纔出頭來管取福慧兩全超今越古裴相國李駙馬韓文公白樂天蘇東坡張無盡即此之類也雖沈迷欲境亦不曾用工纔參見善知識一言之下頓悟上乘超越生死雖在塵中游戲三昧不忘佛囑外護吾門咸載祖燈續佛慧命此等若不是宿世栽培焉得便恁麼開花結子福足慧足是則固是今日山僧却有箇煅凡成聖底藥頭不假栽培底種子說則辭繁略舉一偈欲明種子因熟讀上大人若到可知禮盲龜跛鼈親示淨修侍者予假此來二十四年常在病中求醫服藥歷盡萬般艱苦爭知病在膏肓無藥可療後至雙徑夢中服斷橋和尚所授之丹至第六日不期觸發仰山老和尚所中之毒直得魂飛膽喪絕後重甦當時便覺四大輕安如放下百二十斤一條擔子相似今將此丹授之於汝汝欲服之先將六情六識四大五蘊山河大地萬象森羅總鎔作一箇疑團頓在目前不假一鎗一旗靜悄悄地便似箇清平世界如是行也只是箇疑團坐也只是箇疑團著衣喫飯也只是箇疑團屙屎放尿也只是箇疑團以至見聞覺知總只是箇疑團疑來疑去疑至省力處便是得力處不疑自疑不舉自舉從朝至暮粘頭綴尾打成一片無絲毫縫罅撼亦不動趁亦不去昭昭靈靈常現在前如順水流舟全不犯手只此便是得力底時節也更須慤其正念慎無二心展轉磨光展轉淘汰窮玄盡奧至極至微向一毫頭上安身孤孤迥迥卓卓巍巍不動不搖無來無去一念不生前後際斷從茲塵勞頓息昏散勦除行亦不知行坐亦不知坐寒亦不知寒熱亦不知熱喫茶不知茶喫飯不知飯終日獃憃憃地却似箇泥塑木雕底故謂墻壁無殊纔有遮境界現前即是到家之消息也決定去他不遠也巴得搆也撮得著也只待時刻而已又却不得見恁麼說起一念精進心求之又却不得將心待之又却不得要一念縱之又却不得要一念棄之直須堅凝正念以悟為則當此之際有八萬四千魔軍在汝六根門頭伺候所有一切奇異殊勝善惡應驗之事隨汝心設隨汝心生隨汝心求隨汝心現凡有所欲無不遂之汝若瞥起毫釐差別心擬生纖塵妄想念即便墮他圈繢即便被他作主即便聽他指揮便乃口說魔話心行魔行反誹他非自譽真道般若正因從茲永泯菩提種子不復生芽劫劫生生常為伴侶當知此諸魔境皆從自心所起自心所生心若不起爭如之何天台云汝之伎倆有盡我之不采無窮誠哉是言也但只要一切處放教冷冰冰地去平妥妥地去純清絕點去一念萬年去如箇守屍鬼子守來守去疑團子欻然𪹼地一聲管取驚天動地勉之勉之示信翁居士大抵參禪不分緇素但只要一箇決定信字若能直下信得及把得定作得主不被五欲所撼如箇鐵橛子相似管取剋日成功不怕甕中走鼈豈不見華嚴會上善財童子歷一百一十城參五十三善知識獲無上果亦不出遮一箇信字法華會上八歲龍女直往南方無垢世界獻珠成佛亦不出遮一箇信字涅槃會上廣額屠兒颺下屠刀唱言我是千佛一數亦不出遮一箇信字昔有阿那律陀因被佛訶七日不睡失去雙目大千世界如觀掌果亦不出遮一箇信字復有一少比丘戲一老比丘與證果位遂以皮毬打頭四下即獲四果亦不出遮一箇信字楊岐參慈明和尚令充監寺以至十載打失鼻孔道播天下亦不出遮一箇信字從上若佛若祖超登彼岸轉大法輪接物利生莫不皆由此一箇信字中流出故云信是道元功德母信是無上佛菩提信能永斷煩惱本信能速證解脫門昔有善星比丘侍佛二十年不離左右蓋謂無此一箇信字不成聖道生陷泥犂今日信翁居士雖處富貴之中能具如是決定之信昨於壬午歲登山求見不納而回又於次年冬拉直翁居士同訪始得入門今又越一載齎糧裹糝特來相從乞受毗尼願為弟子故以連日詰其端由的有篤信趣道之志維摩經云高原陸地不生蓮華卑濕淤泥乃生此華正謂此也山僧由是撫之將箇省力易修曾驗底話頭兩手分付萬法歸一一歸何處決能便恁麼信去便恁麼疑去須知疑以信為體悟以疑為用信有十分疑有十分疑得十分悟得十分譬如水漲船高泥多佛大西天此土古今知識發揚此段光明莫不只是一箇決疑而已千疑萬疑只是一疑決此疑者更無餘疑既無餘疑即與釋迦彌勒淨名龐老不增不減無二無別同一眼見同一耳聞同一受用同一出沒天堂地獄任意逍遙虎穴魔宮縱橫無礙騰騰任運任運騰騰故涅槃經云生滅滅已寂滅為樂須知此樂非妄念遷注情識之樂乃是真淨無為之樂耳夫子云夕死可矣顏回不改其樂曾點舞詠而歸咸佩此無生真空之樂也苟或不疑不信饒你坐到彌勒下生也只做得箇依草附木之精靈魂不散底死漢教中言二乘小果雖入八萬劫大定不信此事去聖逾遙常被佛訶直欲發大信起大疑疑來疑去一念萬年萬年一念的的要見遮一著子下落如與人結了生死冤讐相似心憤憤地即欲便與一刀兩段縱於造次顛沛之際皆是猛利著鞭之時節若到不疑自疑寤寐無失有眼如盲有耳如聾不墮見聞窠臼猶是能所未忘偷心未息切宜精進中倍加精進直教行不知行坐不知坐東西不辨南北不分不見有一法可當情如箇無孔鐵鎚相似能疑所疑內心外境雙亡雙泯無無亦無到遮裏舉足下足處切忌踏翻大海踢倒須彌折旋俯仰時照顧觸瞎達磨眼睛磕破釋迦鼻孔其或未然更與添箇注脚僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤師云大小趙州拖泥帶水非特不能為遮僧斬斷疑情亦乃賺天下衲僧死在葛藤窠裏西峰則不然今日忽有人問萬法歸一一歸何處只向他道狗䑛熱油鐺信翁信翁若向遮裏擔荷得去只遮一箇信字也是眼中著屑示理通上人大抵學人打頭不遇本分作家十年二十年遮邊那邊或參或學或傳或記殘羮餿飯惡知惡覺尖尖滿滿築一肚皮正如箇臭糟瓶相似若遇箇有鼻孔底聞著未免惡心嘔吐到遮裏設要知非悔過別立生涯直須盡底傾出三回四回洗七番八番泡去教乾乾淨淨無一點氣息般若靈丹方堪趣向若是悤悤草草打屏不乾縱盛上品醍醐亦未免變作一瓶惡水且道利害在甚麼處咄毒氣深入答直翁居士書來書置問皆是辨論學人用工上疑惑處當為決之俾晚學初機趣向無滯問平常心是道無心是道此平常心無心之語成却多小人誤却多少人往往不知泥中有刺笑裏有刀者何啻有掉棒打月接竹點天古人答一言半句如揮吹毛利刃直欲便要斷人命根若是箇皮下有血底直下承當更無擬議若撞著箇不知痛痒底從饒髑髏徧地也乾沒星子事又如石中藏玉識者知有連城之璧不識者只作一塊頑石視之大抵要見古人立地處不可向語句上著到且道既不在語句上畢竟在甚處著到若向遮裏薦得便知此事不假修治如身使臂如臂使拳極是成現極是省力但信得及便是何待瞠眉豎目做模打樣看箇一字倘或不然古云莫道無心云是道無心猶隔一重關何止一重更須知有百千萬重在苟不發憤志精進下一段死工夫豈於木石之有異乎凡做工夫到極則處必須自然入於無心三昧却與前之無心天地相越達磨云心如牆壁夫子三月忘味顏回終日如愚賈島取捨推敲此等即是無心之類也到遮裏能舉所舉能疑所疑雙忘雙泯無無亦無香嚴聞聲靈雲見色玄沙𡎺指長慶捲簾莫不皆由此無心而悟也到遮裏設有毫釐待悟心生纖塵精進念起即是偷心未息能所未忘此之一病悉是障道之端也若要契悟真空親到古人地位必須真正至於無心三昧始得然此無心汝譬頗明吾復以偈證之不得遮箇爭得那箇既得那箇忘却遮箇然雖如是更須知道遮箇那箇總是假箇的的真底聻咄陽𦦨空華通仰山雪巖和尚疑嗣書昔年敗缺親曾剖露師前今日重疑不免從頭拈出某十五歲出家十六為僧十八習天台教二十更衣入淨慈立三年死限學禪遂請益斷橋和尚令參生從何來死從何去於是意分兩路心不歸一又不曾得斷橋和尚說做工夫處分曉看看擔閣一年有餘每日只如箇迷路人相似那時因被三年限逼正在煩惱中忽見台州淨兄說雪巖和尚常問你做工夫何不去一轉於是欣然懷香詣北磵塔頭請益方問訊插香被一頓痛拳打出即關却門一路垂淚回至僧堂次日粥罷復上始得親近即問已前做處某一一供吐當下便蒙勦除日前所積之病却令看箇無字從頭開發做工夫一徧如暗得燈如懸得救自此方解用工處又令日日上來一轉要見用工次第如人行路日日要見工程不可今日也恁麼明日也恁麼每日纔見入來便問今日工夫如何因見說得有緒後竟不問做處一入門便問阿誰與你拖遮死屍來聲未絕便以痛拳打出每日但只恁麼問恁麼打正被逼拶有些涯際值老和尚赴南明請臨行囑云我去入院了却令人來取你後竟絕消息即與常州澤兄結伴同往至俗親處整頓行裝不期俗親念某等年幼又不曾涉途行李度牒總被收却時二月初諸方挂搭皆不可討不免挑包上徑山二月半歸堂忽於次月十六夜夢中忽憶斷橋和尚室中所舉萬法歸一一歸何處話自此疑情頓發打成一片直得東西不辨寢食俱忘至第六日辰巳間在廊下行見眾僧堂內出不覺輥於隊中至三塔閣上諷經擡頭忽覩五祖演和尚真贊末後兩句云百年三萬六千朝返覆元來是遮漢日前被老和尚所問拖死屍句子驀然打破直得魂飛膽喪絕後再甦何啻如放下百二十斤擔子乃是辛酉三月廿二少林忌日也其年恰廿四歲滿三年限便欲造南明求決那堪逼夏諸鄉人亦不容直至解夏方到南明納一場敗缺室中雖則累蒙煅煉明得公案亦不受人瞞及乎開口心下又覺得渾了於日用中尚不得自由如欠人債相似正欲在彼終身侍奉不料同行澤兄有他山之行遽違座下至乙丑年老和尚在道場作挂牌時又得依附隨侍赴天寧中間因被詰問日間浩浩時還作得主麼答云作得主又問睡夢中作得主麼答云作得主又問正睡著時無夢無想無見無聞主在甚麼處到遮裏直得無言可對無理可伸和尚却囑云從今日去也不要你學佛學法也不要你窮古窮今但只飢來喫飯困來打眠纔眠覺來却抖擻精神我遮一覺主人公畢竟在甚處安身立命雖信得及遵守此語奈資質遲鈍轉見難明遂有龍鬚之行即自誓云𢬵一生做箇癡獃漢定要見遮一著子明白經及五年一日寓庵宿睡覺正疑此事忽同宿道友推枕子墮地作聲驀然打破疑團如在羅網中跳出追憶日前佛祖所疑誵訛公案古今差別因緣恰如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處自此安定國天下太平一念無為十方坐斷如上所供並是詣實伏望尊慈特垂詳覽室中垂語大徹底人本脫生死因甚命根不斷佛祖公案只是一箇道理因甚有明與不明大修行人當遵佛行因甚不守毗尼杲日當空無所不照因甚被片雲遮却人人有箇影子寸步不離因甚踏不著盡大地是箇火坑得何三昧不被燒却普說尋常教人做工夫看箇萬法歸一一歸何處公案看時須是發大疑情世間一切萬法總歸一法一畢竟歸在何處向行住坐臥處著衣喫飯處屙屎放尿處抖擻精神急下手脚但恁麼疑畢竟一歸何處決定要討箇分曉不可拋在無事甲裏不可胡思亂想須要緜緜密密打成一片直教如大病一般喫飯不知飯味喫茶不知茶味如癡如呆東西不辨南北不分工夫做到遮裏管取心華發明悟徹本來面目生死路頭不言可知須要世間情念放教輕微道念自然濃厚古人云生處要熟熟處要生閑時不要看經消遣工夫不得成一片只要起身行道急著精神討箇一歸何處著落自然不用看經公案便是一卷不斷頭經晝夜常轉何須又要頭上安頭若作恁麼工夫天龍自然護持何須祈禱但要絕世緣省言語古人道二十年不開口說話向後佛也奈何你不得生死事大無常迅速如人上山各自努力勉之偈曰紅塵堆裏學山居寂滅身心道有餘但得胸中憎愛盡不參禪亦是工夫
