body:
  text: 拈古世尊才生下乃一手指天一手指地周行七步目顧四方云天上天下惟吾獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平師云世尊大似靈龜曳尾自取喪身之兆雲門雖則全提正令也是為他間事長無明當時但於地上劃一圓相就圓相中書箇丁字復展兩手示之管取冰消瓦解世尊一日升座默然而坐阿難白椎云請世尊說法世尊云會中有二比丘犯律行我故不說法阿難以他心通觀二比丘遂乃遣出世尊還復默然阿難又白適來為二比丘犯律是二比丘已遣出世尊何不說法世尊云吾誓不為二乘聲聞人說法便下座師云世尊能挽千鈞之弩銀山鐵壁箭箭皆通阿難雖有隱身之術殊不覺髑髏後中箭還有躲得過底麼世尊有異學問諸法是常耶世尊不對又問諸法是無常耶亦不對異學曰世尊具一切智何不對我世尊云汝之所問皆為戲論師云異學有言若啞世尊無語如雷遮裏見得分明正是增益戲論何故諦聽諦聽世尊因自恣日文殊三處過夏迦葉欲白槌擯出才拈槌乃見百千萬億文殊迦葉盡其神力槌不能舉世尊遂問迦葉汝擬擯那箇文殊迦葉無對師云文殊知底迦葉不知迦葉知底文殊不知彼彼不知且置百千萬億文殊那箇是真底世尊昔在靈山會上拈花示衆是時衆皆默然惟迦葉尊者破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉師云世尊扶頭迦葉扶尾直至如今擡舉不起莫有共著力者麼以兩手作扶勢云也只兀底世尊於涅槃會上以手摩胸告衆云汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億衆悉皆契悟師云黃面瞿曇四十九年顛之倒之橫說豎說貴圖末後殷勤殊不知賺他百萬億衆生令墮在鐵圍山下無由解脫馬大師因僧問離四句絶百非請師直指西來意師云我今日勞倦不能為你說問取智藏去僧乃問藏藏云何不問和尚曰和尚教來問藏云我今日頭痛不能為你說去問取海兄僧遂問海海云我到遮裏却不會僧回舉似師師云藏頭白海頭黑師云馬師父子一門非特佛口蛇心亦善六韜三略遮僧若無諸葛孔明之作管取喪身失命僧問馬祖如何是佛祖云即心是佛師云衆中商量皆謂心本是佛佛外無心故云即心是佛苦哉苦哉若作遮般見解明後日喫鐵棒有分在既然如是合作麼生石壓筍斜出崖懸花倒生百丈和尚凡參次有一老人常隨衆聽法一日衆退惟老人不退丈問汝何人也老人云諾某甲非人也於過去迦葉佛時曾住此山因學人問大修行底人還落因果也無對云不落因果五百生墮野狐身今請和尚代一轉語貴脫野狐身遂問大修行底人還落因果也無丈云不昧因果老人於言下大悟作禮云某甲已脫野狐身住在山後敢告和尚乞依亡僧事例丈令維那白槌告衆食後送亡僧大衆言議一衆皆安涅槃堂又無病人何故如是食後丈自領衆至山後巖下以杖挑出一死野狐乃依法火葬師云大衆前云不落後云不昧還有得失也無若無因甚有墮有脫若有試舉出來分明道看有麼有麼總是一隊野狐精莫怪山僧壓良為賤忠國師因西天大耳三藏到京云得他心通肅宗帝命國師試驗三藏才見忠乃禮拜立於右忠問汝得他心通耶藏曰不敢忠云汝道老僧即今在甚處藏曰和尚是一國之師何得去西川看競渡船忠良久再問汝道老僧即今在甚處藏曰和尚是一國之師何得向天津橋上看弄胡孫忠第三問藏良久罔知去處忠叱云遮野狐精他心通在甚麼處三藏無對師云大小國師平生伎倆總被遮胡僧勘破雖然賴遇聖君證明南泉住庵時一僧到泉乃云某甲上山作務請齊時作飯自喫了却送一分來其僧齊辦自喫了却將家事一時打破仍就牀臥泉伺久不來遂歸見僧臥泉亦去一邊臥僧便起去泉住後云我往前住庵時有箇靈利道者來直至如今不見師云南泉雖則步步踏實未免隨人起倒遮僧縱解飽食高眠決定不知飯是米做高峰恁麼告報設有一字妄虗永墮拔舌地獄趙州因僧遊臺山凡問一婆云臺山路向甚處去婆云驀直去僧才行三五步婆云好箇師僧又與麼去後有舉似趙州州云待我去勘過遮婆子明日便去亦如是問婆亦如是對州歸謂衆曰臺山婆子我為勘破了也師云遮箇公案若據諸方判斷趙州勘破婆子若據高峰點檢將來正是婆子勘破趙州畢竟以何為驗以手指云驀直去僧問趙州狗子還有佛性也無州云無師云大小趙州拈出一粒巴豆子攪惱衲僧腸肚設有吞吐得者亦不免喪身失命何故急急如律令僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤師云趙州一段綿密工夫風吹不入雨打不濕惜乎不解相體裁衣翻成鈍置高峰則不然忽有人問萬法歸一一歸何處只向他道我二十年前曾向遮裏打失一隻眼睛至今指鹿為馬大衆且道與古人相去多少甘贄行者開接待凡有問行者接待不易者云譬如餧驢餧馬琅琊云快把飯來五祖和尚云願行者長似今日師云琅琊和尚美則美矣只是做造愴忙不堪供養五祖和尚不鑑來風一鑊淡虀羮可惜著了許多鹽醋譬如餧驢餧馬只向他道殘羮餿飯不勞拈出大衆且道與古人是同是別定當得出日消萬兩黃金不然喫水也須防噎陸亘大夫問南泉弟子家中有片石亦曾坐亦曾臥如今欲鐫作佛得麼泉云得得大夫云莫不得麼泉云不得不得師云南泉恁麼祗對正所謂聖人無常心以百姓心為心也大夫嘗問南泉曰弟子家中於一瓶內養得一鵝兒今來長大欲出此鵝且不得打破瓶亦不得損却鵝未審和尚有何方便泉召云大夫大夫應諾泉云出也師云南泉潦倒手眼不親縱饒出得也是死貨高峰只向他道大夫還曾示人麼才擬祗對便與亂棒打出非特為遮漢脫却鶻臭布衫要使天下衲僧箇箇解粘去縛慶快平生木平問洛浦一漚未發時如何浦云移舟諳水脈舉棹別波瀾平不契又問盤龍龍云移舟不別水舉棹即迷源平於此有悟後雲峰悅和尚云若於洛浦言下悟去猶較些子後來不合向盤龍死水裏浸殺師云若不是悅公洎合被他瞞却然雖如是且道盤龍誵訛在甚處移舟不別水舉棹即迷源石鞏和尚凡見僧以弓架箭示之一日三平至鞏云看箭三平乃撥開胸云此是殺人箭活人箭又作麼生鞏乃扣弓絃三下平便作禮鞏云三十年架一張弓兩隻箭只射得半箇聖人遂拗折弓箭師云石鞏張弓傍若無人三平承箭弄巧成拙然雖如是半箇聖人又作麼生落花片片隨流水流水無心戀落花雪峰在德山作飯頭一日飯遲方曬飯巾次乃見德山自托鉢至法堂前峰遂問遮老漢鐘未鳴鼓未響托鉢向甚處去山便回方丈峰舉似巖頭頭云大小德山不會末後句山聞令侍者喚巖頭去問汝不肯老僧那巖遂密啓其意山乃休去至明日升堂果與尋常不同巖至僧堂前撫掌大笑云且喜得老漢會末後句他後天下人不奈伊何雖然如是也只得三年師云佛祖機緣古今公案其中誵訛無出於此或謂巖頭智過於師故有密啓其意殊不知犯彌天之咎萬劫遭殃且道利害在甚麼處撫掌大笑云侍者分明記取三十年後有人證明雪峰示衆云南山有一條鱉鼻蛇汝等諸人切須好看時長慶出云今日堂中大有人喪身失命雲門以拄杖攛向峰前作怕勢後僧舉似玄沙沙云須是稜兄始得然雖如是我則不然僧云和尚作麼生沙云用南山作麼師云雪峰和尚雖慣作竊爭奈諸子不善參隨未免一場敗露至今千載之下惡聲猶在僧問夾山如何是夾山境山云猿抱子歸青嶂裏鳥銜花落碧巖前後法眼道老僧二十年只作境話會師云大衆還會麼直饒向遮裏會得見法眼則易見夾山則難僧問投子如何是十身調御子下繩牀立又有問凡聖相去多少子亦下繩牀立師云一轉語天懸地殊一轉語言端語的具眼底試辨看聲明三藏善別音聲劉大王請玄沙驗之沙乃將銅火筯敲鐵火爐問云是甚麼聲藏云銅鐵聲沙云大王莫受外國人瞞師云大小玄沙能所未忘當時賴遇是劉大王若撞著箇本分衲僧管取一場漏逗玄沙坐次見面前地上一點白指問侍者云見麼者云見如是三問如是三對沙云你也見我也見因甚麼道不會師云大衆見即見會即會無復疑矣且道遮一點白決定是箇甚麼仙天和尚因一僧參擬作禮次天云野狐兒見甚麼了便禮拜僧云老禿奴見甚麼了即便與麼問天云苦哉苦哉仙天今日忘前失後僧云要且得時終不補失天云爭不如此僧云誰甘天呵呵笑云遠之遠矣僧以目四顧便出師云一問一答有賓有主盡謂二俱作家若據高峰點檢將來遮僧猶自可仙天笑殺人和安通禪師因仰山作沙彌時常喚寂子與我拈牀子來仰持至通云送舊處著復問寂子牀那邊是甚麼曰無物遮邊聻曰無物通又召寂子子應諾通云去師云潦倒和安用心不臧仰山命蹇為魅所著山僧恁麼道也是逆風秉炬僧問佛日𢏺禪師如何是毗盧印弼云草鞋踏雪僧云學人不會弼云步步成跡師云佛日和尚雖則不負來機高提祖印殊不知古篆難明致令遮僧遇如不遇若是高峰則不然忽有人問如何是毗盧印但言文不加點又云學人不會但云要會作麼且道與佛日是同是別僧問高安澄禪師舊歲已去新歲到來還有不受歲者麼澄云作麼生僧云恁麼則不受歲也澄云城上已吹新歲角窗前猶點舊年燈僧云如何是舊年燈澄云臘月三十日師云大小高安被遮僧隨後一逐如鼠入牛角相似直至如今轉身不得莫有救得底麼且待來年雪竇和尚示衆云客從遠方來遺我徑寸璧中有四箇字字字無人識佛鑑師翁拈云客從遠方來遺我徑寸璧中有四箇字不必重拈出師云二大老一人說易一人說難未免見有偏枯高峰則不然客從遠方來遺我徑寸璧中有四箇字字字無平仄頌古世尊在靈山會上拈一枝花瞬青蓮目普視大衆時百萬人天惟迦葉破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相微妙法門付囑摩訶迦葉靈山拈出一枝花百萬都來是作家惟有飲光猶未瞥那堪眼裏又添沙世尊昔因文殊至諸佛集處值諸佛各還本處惟有一女人近彼佛坐入於三昧文殊乃白佛云何此人得近佛坐而我不得佛告文殊汝但覺此女令從三昧起汝自問之文殊繞女人三匝鳴指一下乃托至梵天盡其神力而不能出世尊云假使百千文殊亦出此女人定不得下方過四十二恆河沙國土有罔明菩薩能出此女人定須臾罔明大士從地涌出作禮世尊敕罔明出罔明却至女子前鳴指一下女子於是從定而出兩兩成羣罪莫窮謾將鼠伎逞英雄當時若作今時世縱使瞿曇也不中達磨大師一日命門人曰時將至矣汝等盍各言所得乎時有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮又尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉又道育曰四大本空五蘊非有而我見處無一法何當情祖曰汝得吾骨最後慧可大師出禮拜依位而立祖曰汝得吾髓乃傳衣付偈死欵都來一口供情窮理極卒難容若將皮髓論高下爭見花開五葉紅僧問六祖黃梅意旨甚麼人得祖云會佛法人得僧云和尚還得麼祖云我不得僧云為甚麼不得祖云我不會佛法祖師不會禪夫子不識字棒打石人頭嚗嚗論實事僧問馬大師離四句絶百非請師直指西來意師云我今日勞倦不能為汝說去問取智藏僧問藏藏云我今日頭疼不能為汝說去問取海兄僧問海海云我到遮裏却不會僧回舉似師師云藏頭白海頭黑攢花簇錦絶纖塵一度拈來一度新啼得血流無用處不如緘口過殘春馬大師云即心是佛又云非心非佛殺人猶可恕再犯豈能容貶向無生國千聖不知蹤藥山久不升堂院主白云大衆久思和尚示誨山云打鐘著時衆方集藥山便下座歸方丈院主復白云和尚許為衆說法為甚一言不施山云經有經師論有論師爭怪得老僧眉毛罅裏積山嶽鼻孔中藏師子兒南北東西無限意此心能有幾人知溈山云老僧百年後向山下作一頭水牯牛左肋書五字云溈山僧某甲此時若喚作溈山僧又是水牯牛喚作水牯牛又云溈山僧某甲且道喚作甚麼緑樹陰濃夏日長樓臺倒影入池塘水晶簾動微風起滿架薔薇一院香甘贄行者因巖頭在家過夏一日把針次甘贄前立頭乃以針作劄勢甘遂歸著衣擬出禮謝妻乃問翁作甚麼甘云不得說妻云有甚事也要大家知甘舉前話妻云從此三十年後須知一度喫水一度噎殺人女子聞乃云還知盡大地人性命被奯上座針頭上劄將去也無幸然無事鼓風濤激起洪波萬丈高直得渾家都浸殺至今平地浪滔滔趙州勘婆子自小丹青晝不成年來始覺藝方精等間擲筆成龍去喚却時人眼裏睛趙州三佛泥佛不度水毗嵐風忽起大地黑漫漫衲僧爭敢視金佛不度爐鐵裹夜明珠一槌俱粉碎清光何處無木佛不度火掣開金殿鎖內外絶遮欄時人猶懡㦬趙州無字趙州狗子佛性無十分春色播江湖幾多摘葉尋枝客空使洛陽花滿途趙州一日在佛殿上見文遠侍者禮佛以拄杖打遠一下遠云禮佛也是好事州云好事不如無禮佛修行不較多何須特地起干戈直饒打得回頭後兔子何曾離得窠萬法歸一一歸何處四面洪波萬丈深上天無路地無門箇中有理應難訴不是愁人也斷魂嚴陽尊者問趙州一物不將來時如何州云放下著陽云一物不將來放下箇甚麼州云看你放不下陽當下大悟吞而復吐冷烟浮月落寒山猶未休重把絲綸輕一掣豈知元只在鈎頭尼問趙州密密意州以腕上掐一掐尼云和尚猶有遮箇在州云你猶有遮箇在猛虎深藏淺草窠幾回明月入烟蘿頂門縱有金剛眼未免當頭蹉過他臨濟示衆云赤肉團上有一無位真人常在面門出入颯颯秋風滿院涼芬芳籬菊半經霜可憐不遇攀花手狼籍枝頭多少香僧問興化四方八面來時如何化云打中間底僧便禮拜化云我昨日赴箇村齊中途遇卒風暴雨却向古廟裏躲得過飢火炎炎燒斷腸親逢王膳不能嘗可憐併逐溪流去百億滄溟透底香肅宗皇帝問忠國師云百年後所須何物忠云與老僧造箇無縫塔帝云就師請塔樣忠良久云會麼帝云不會忠云吾有付法弟子耽源却諳此事請問之後詔問源源乃有頌云湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識國師塔樣最尖新覿面拈來不露文却被耽源添一線至今描邈亂紛紛陸亘大夫問南泉弟子家中有一片石也曾坐也曾臥擬鐫作佛得麼泉云得得亘云莫不得麼泉云不得不得楊柳溪邊垂緑線黃鶯枝上聲聲囀幾多貪玩不知春空使落花千萬片靈雲見桃花悟道三十年來在夢中生涯喪盡絶行蹤自慚一見桃花後依舊漫天鼓黑風玄沙云諦當甚諦當敢保老兄未徹在落花臺上重鋪錦瑪瑙階前布赤沙情義盡從貧處斷世人偏向有錢家夾山和尚示衆云我二十年住此山未嘗舉著宗門中事一日有僧問承和尚有言二十年住此山未曾舉著宗門中事是否山云是僧便掀倒禪牀山休去至明日普請掘一坑令侍者請昨日問話僧來山云老僧二十年來只說無義語今請上座打殺老僧埋向坑中便請便請上座若不打殺老僧上座自著打殺埋此坑中始得其僧歸堂裝束潛去紅輪杲杲正當空昨日今朝事不同盡謂古今都坐斷誰知賊過後張弓百丈云汝等為我開田吾為汝說大義僧開田了白云開田已竟請和尚說大義百丈行數步而立展開兩手滯貨多年要脫身巧粧綺語說諸人及乎拈出當場賣索價遼天誰敢親雲門垂語云乾坤之內宇宙之間中有一寶祕在形山拈燈籠南佛殿裏將三門來燈籠上弓絃走馬驀相逢覿面全提未見功拈出輪王三寸鐵直教血濺梵天紅僧問慈明如何是古佛家風明云銀蟾初出海何處不分明銀蟾出海照無私處處分明是阿誰見面不須重問訊從教日炙與風吹僧問慈明如何是不動尊明云提不起不動尊提不起茫茫宇宙誰能委秋江清夜月澄輝鷺鷥飛入蘆花裏李駙馬問慈明我聞西河有金毛師子是不明云駙馬甚處得遮消息李喝一喝明云野犴鳴李又喝明云師子吼逆風吹又順風吹鐵眼銅睛爭敢窺萬古碧潭空界月再三撈摝始應知黃龍三關佛手驢腳與生緣鬼面人頭有許般雲散碧天孤月朗澄潭徹底影團團五祖演和尚一日持錫繞廊云莫有屬牛人問命麼衆皆無語自云孫臏今日開鋪更無一人垂顧可憐三尺龍鬚喚作尋常破布無端平地起干戈爭似屬牛人更多滿面慚惶無著處低頭依舊入烟蘿五祖演和尚謝監收上堂人之性命第一須是欲得成此先須防於若是真人一二三四五六圈心肝粉碎髑髏穿若將方木投圓竅醜姥爭教得少年補遺若要真正決志明心先將平日胸中所受一切善惡之物盡底屏去毫末不存終朝兀兀如癡與昔嬰孩無異然後乃可蒲團靜坐正念堅凝精窮向上之玄機研味西來之密旨切切拳拳兢兢業業直教絲毫無間動靜無虧漸至深密幽遠微細微細極微細處譬如有人遠行他方漸漸回途已至家舍又如鼠入牛角看看走至尖尖盡底又如捉賊討贓拷至情理俱盡不動不退無去無來一念不生前後際斷卓卓巍巍孤孤迥迥如坐萬仞崖頭又若停百尺竿上一念才乖喪身失命將至功成九仞切須保任全提忽於經行坐臥處不覺㘞地一聲猶如死在漫天荊棘林中討得一條出身活路相似豈不快哉若是汩沒塵勞不求升進譬如水上之浮木其性實下暫得身輕不堪浸潤又如庭中之花雖則色香俱美一朝色萎香滅無復可愛又如農夫之種田雖有其苗而功力不至終不成實便如貧窮乞兒得少為足久久萌芽再發荊棘復生被物之所轉終歸沈溺無上清淨涅槃無由獲覩豈不枉費前功虗消信施若是有志丈夫正好向遮裏晦迹韜光潛行密用或三十年二十年以至一生終無他念踏得實實落落穩穩當當直教纖塵不立寸草不生往來無礙去住自由報緣遷謝之日管取推門落臼若則恁麼紙裹茅纏龍頭蛇尾非特使門風有玷亦乃退後學初心如上所述管見莫不皆是藜藿之類飽人不堪供養以俟絶陳之流終有一指之味往往學道之士忘却出家本志一向隨邪逐惡不求正悟妄將佛祖機緣古人公案從頭穿鑿遞相傳授密密珍藏以為極則便乃不守毗尼撥無因果人我愈見崢嶸三毒倍加熾盛如斯之輩不免墮於魔外永作他家眷屬若有未遭邪謬不負初心當念無常迅速痛思苦海沈淪趁二時粥飯見成百般受用便當便好乘時直入莫待臨嫁醫癭此乃從上佛祖之心印無礙解脫之妙門設使機緣不偶工力未充切須捨命忘形勤行苦行至死𢬵生一心不退復有葛藤未盡不免重說偈言此心清淨本無瑕只為貪求被物遮突出眼睛全體露山河大地是空花參禪若要剋日成功如墮千尺井底相似從朝至暮從暮至朝千思想萬思想單單則是箇求出之心究竟決無二念誠能如是施功或三日或五日或七日若不徹去西峰今日犯大妄語永墮拔舌犂耕若論此事如登一座高山相似三面平夷頃刻可上極是省力極是利便若曰回光返照點檢將來耳朵依前兩片皮牙齒依舊一具骨有甚交涉有甚用處若是拏雲攫霧底漢子決定不墮遮野狐窟中埋沒自己靈光辜負出家本志直向那一面懸崖峭壁無棲泊處立超佛越祖心辦久久無變志不問上與不上得與不得今日也𢬵命跳明日也𢬵命跳跳來跳去跳到人法俱忘心識路絶驀然踏翻大地撞破虗空元來山即自己自己即山山與自己猶是冤家若要究竟衲僧向上巴鼻直須和座揚在他方世界始得若論此事的的用功正如獄中當死罪人忽遇獄子醉酒睡著敲枷打鎖連夜奔逃於路雖多毒龍猛虎一往直前了無所畏何故則為一箇切字用功之際果能有此初心管取百發百中即今莫有中底麼以拂子擊禪牀一下云毫𨤲有差天地懸隔若論剋期取證如人擔雪填井不憚寒暑不分晝夜橫也擔豎也擔是也擔非也擔擔來擔去縱使經年越歲以至萬劫千生於其中間信得及踏得穩把得定作得主曾無一念厭離心曾無一念懈怠心曾無一念狐疑心曾無一念求滿心果能有恁麼時節果能具恁麼氣槩到遮裏管取人法雙忘心識俱泯形如槁木朽株志若嬰兒赤子驀然擔子卒地斷嚗地折永嘉道大千沙界海中漚一切聖賢如電拂好與三十痛棒若論此事不假長劫熏修積功纍德亦不問賢愚利鈍久習初機只貴孟八郎漢不顧危亡得喪發大憤志起大疑情如善財童子參勝熟婆羅門大火聚中投身而入正恁麼時人法俱忘心機泯絶左之右之𡎺著磕著不是洞山麻三斤定是雲門乾矢橛若還𣯧𣯧魍魍魎魎莫道親見高峰直饒向老胡肚皮裏打一遭依前乾沒一星事偈頌頌趙州無字示陳太尉澄潭千載毒龍蟠倒嶽傾湫誰解看直下一刀成兩段虗空粉碎髑髏乾示如法禪人識得根源認得伊全身猶墮在塵圍縱然和座都掀倒尚有烟霞繞翠微直造懸崖上上關白雲影裏轉身難箇中若使能通變奪食驅耕總是閒如如不動法中王舉足無非是道場不到水窮雲盡處爭知覿面是檀郎示如夢禪人行腳閒處休居靜莫住轉入轉深轉幽固縱至深深盡底時更須知有那一步昔日曹溪親到來今時往往多差互若非喪盡目前機倒嶽傾湫無覓處山中四威儀供佛鑑師翁韻山中行步高身儘輕擬飛去惟恐世人驚山中住黯淡雲無數誓相期共守無生路山中坐靜看空花墮問何為待結團欒果山中臥月落猿啼過正堪眠石定從教破雲庵或淡或濃拖雨去半舒半捲逆風來為憐途路無棲泊却把柴扉永夜開示徒學道如初莫變心千魔萬難愈惺惺直須敲出虗空髓拔却金剛腦後釘學道之心似鏡明纖塵才染便忘形廓然照出娘生面一簇青烟鎖翠屏學道如撑逆水舟篙篙著力莫隨流忽然失腳翻身去踏斷寒江月一鈎又示徒工夫果的有真疑動靜寒暄總不知枕子驀然開口笑鉢盂𨁝跳上須彌示淳謙首座持鉢千家萬家總是維摩丈室十斛百斛無非達磨眼睛若向遮裏會得何勞向外經營其或未然咄酒肆淫坊休放過龍宮虎穴要親臨示徒三戒開口動舌無益於人戒之莫言舉心動念無益於人戒之莫起舉足動步無益於人戒之莫行辭世來不入死關去不出死關鐵蛇鑽入海撞倒須彌山小佛事若瓊上座火舉炬云向遮裏薦得拈一莖草即是瓊樓玉殿不然瓊樓玉殿即是一莖草擲下火云剔起眉毛火裏看志足淨人火生不足死有餘灰飛烟滅露全軀便恁麼有何拘六月炎炎火一爐志藏淨人煅骨一大藏教全體是火若有嶺南靈骨便好赤身擔荷雖然更入紅爐重煅過二正煅座煆骨一人齒不壞正上座兩不成雙一不成隻牙齒分明是具骨萬煆爐中色正輝泥牛觸碎蒼龍窟志光居士火吳士以火打圓相云姑蘇水天目山總是維摩不二關烈𦦨光中回首處依稀髣佛似人間廣捨上座煅骨取不得捨不得正恁麼時如何委悉咄剔起眉毛火裏看分明一具黃金骨明山都管火以火打圓相云遮裏見得便見山即山水即水大洋海底火星飛天目峰頭波浪起不然擲下火云家家門前火把子志明道人火只遮一著子今古無傳授惟有明道人始終能保守守鐵牛火裏翻筋斗得意化主入塔得意忘言逆行順化常在途中不離家舍彈指一下塔戶開了也遍界髑髏無處藏遮裏全身俱放下法曇上座火汝名瞿曇佛名法曇分明舉似疑則別參擲火云大洋海裏火燒龕讚佛祖觀音大士大海波心磐陀石上真觀淨觀是相非相如月在天無水不現水月俱捐如何瞻仰咄切忌妄想達磨祖師二開旗展陳入梁未覩天顏早已降縱有神通難轉欵翩翩一葦渡長江三空請讚未離西乾惡聲已布面壁九年一場敗露咦不知賺却多少兒孫直至如今釘樁搖櫓自讚師子院明初院主請鼻無兩竅眼露雙睛十分無面目一味得人憎將正續三世之業等閒籍沒向白雲千峰之上特地掀騰坐斷死關幸自惡聲難掩那更被伊描邈轉見可憐生呵呵呵三十年後寧無人路見不平大覺禪師祖雍長老請中大仰毒奮師子威平生負重病舉世無良醫向蓮峰插一莖草為少室發千鈞機舌頭無骨額下生眉喚作開山即錯不喚作開山猶非從教後代亂針錐西隱接待師立山主請地名西馬塍烏豆眼睛生鐵面直向孤峰頂上將無米飯塞斷天下衲子咽喉固是家常因甚更教人參箇一歸何處吽憶著江南三月天馬塍西畔春無數雙髻禪庵請恣無明逞人我誹釋迦罵達磨雖是赤心返成話墮六年坐鋪賣不行至今被人喚作滯貨禪人請讚二遮箇村僧只好聞名尾巴才露天下人憎不識巖頭密啓處剛言悟得仰山禪遮場敗露難遮蓋留與兒孫萬世傳行狀師姓徐諱原妙蘇之吳江人受業秀之密印雪巖欽禪師的嗣生宋戊戌三月二十三日申時受具癸丑寶祐乙卯行腳辛酉得悟丙寅隱龍鬚苦行九載甲戌遷雙髻大元己卯上西峰辛巳入張公洞扁死關不越戶十五年學徒參請無虗日僧俗授戒幾數萬人開山師子大覺元貞乙未臘月朔焚香說偈告衆坐亡春秋五十八臘四十三度徒弟幾百人以是月二十一日庚申全龕塔於死關之內從治命也孝小師明初嗣法比丘祖雍識行狀師諱原妙號高峰吳江人俗姓徐母周氏夢僧乘舟投宿而孕宋嘉熙戊戌三月二十三日申時生才離襁褓喜趺坐遇僧入門輒愛戀欲從之游十五歲懇請父母出家投嘉禾密印寺法住為師十六剃髮十七受具十八習天台教二十更衣入淨慈立三年死限學禪一日父兄尋訪巍然不顧二十二請益斷橋倫令參生從何來死從何去話於是脅不至席口體俱忘或如廁惟中單而出或發函忘扃鐍而去時同參僧顯慨然曰吾己事弗克辦曷若輔之有成朝夕護持惟謹時雪巖欽寓北澗塔欣然懷香往扣之方問訊即打出閉却門一再往始得親近令看無字自此參扣無虗日欽忽問阿誰與你拖箇死尸來聲未絶即打如是者不知其幾師扣愈䖍值欽赴處之南明師即上雙徑參堂半月偶夢中忽憶斷橋室中所舉萬法歸一一歸何處話疑情頓發三晝夜目不交睫一日少林忌隨衆詣三塔諷經次擡頭忽覩五祖演和尚真讚云百年三萬六千朝返覆元來是遮漢驀然打破拖死尸之疑其年二十四矣解夏詣南明欽一見便問阿誰與你拖箇死尸到遮裏師便喝欽拈棒師把住云今日打某甲不得欽曰為甚麼打不得師拂袖便出翌日欽問萬法歸一一歸何處師云狗䑛熱油鐺欽曰你那裏學遮虗頭來師云正要和尚疑著欽休去自是機鋒不讓次年江心度夏迤𨓦由國清過雪竇見西江謀希叟曇寓旦過曇問曰那裏來師拋下蒲團曇曰狗子佛性你作麼生會師云拋出大家看曇自送歸堂暨欽挂牌於道場開法於天寧師皆隨侍服勞屢將有所委任辭色毅然終不可強一日欽問日間浩浩時還作得主麼師云作得主又問睡夢中作得主麼師云作得主又問正睡著時無夢無想無見無聞主在甚麼處師無語欽囑曰從今日去也不要汝學佛學法也不要汝窮古窮今但只飢來喫飯困來打眠才眠覺來却抖擻精神我遮一覺主人公畢竟在甚麼處安身立命丙寅冬遂奮志入臨安龍鬚自誓曰𢬵一生做箇癡呆漢決要遮一著子明白越五載因同宿友推枕墮地作聲廓然大徹自謂如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處在龍鬚九年縛柴為龕風穿日炙冬夏一衲不扇不爐日搗松和糜延息而已嘗積雪沒龕旬餘路梗絶烟火咸謂死矣及霽可入師正宴坐那伽甲戌遷武康雙髻峰蓋和庵主攀緣又上一稜層之意也及至學徒雲集然庵小難容乃拔其尤者居之丙子春學徒避兵四去師獨掩關危坐自若及按堵啓戶視師則又疇昔雪中之那伽也於是戶履彌夥應接不暇乃有楖𣗖橫肩不顧人直入千峰萬峰去之語己卯春腰包宵遁直造天目西峰之肩有師子巖拔地千仞崖石林立師樂之有終焉之意弟子法升等追尋繼至為葺茅蓋頭未幾慕羶之蟻後集師乃造巖西石洞營小室如舟從以丈衡半之榜以死關上溜下淖風雨飄搖絶給侍屏服用不澡身不剃髮截甕為鐺併日一食晏如也洞非梯莫登撤梯斷緣雖弟子罕得瞻視乃有三關語以驗學者云大徹底人本脫生死因甚命根不斷佛祖公案只是一箇道理因甚有明與不明大修行人當遵佛行因甚不守毗尼倘下語不契遂閉門弗接自非具大根負大志鮮不望崖而退雪巖方住大仰凡三喚師堅臥不起遂有竹篦麈拂及緑水青山同一受記語來授師懷中瓣香始於人天前拈出道風所屆日益遠遂有他方異域越重海踰萬山而來者矣鶴沙瞿提舉歸敬有年辛卯春得登山一瞻師顏恍如宿契惠然施巨莊贍海衆師曰多易必多難吾力弗克勝堅拒之施心彌篤乃命僧議以此田歲入別於西峰建一禪剎請於官而後營之師欲不從不可得也爰得勝地名蓮花峰岡脈形勢天造地設得請以大覺禪寺為額請祖雍權管寺事田四稔所營亦既什三師有厭世之心矣師患胃疾已數年然起居飲食待人接物皆未嘗廢乙未十一月二十六日祖雍偕明初來省師師竟以末後事付囑遂取兩真軸口占二讚乃書之十二月初一日黎明辭衆云西峰三十年妄談般若罪犯彌天末後有一句子不敢纍及平人自領去也大衆還有知落處者麼良久云毫釐有差天地懸隔衆皆哀慟不已至辰巳間說偈曰來不入死關去不出死關鐵蛇鑽入海撞倒須彌山泊然而寂啓龕七日端然如生緇素奔哭者填咽越二十一日庚申塔全身於死關遵遺命也壽五十八臘四十三弟子僅百人受毗尼及請益者數萬人示寂後遠邇之人恨不得承顏領誨於塔前慟哭然頂煉臂者猶憧憧不絶師平日以慈悲為人自任其在龍鬚也有僧若瓊焚祠牒從師忽染病師告之曰病中絶緣正好做工夫汝臭皮袋皆委之於我但和病捱去決不相賺且往供給而啓發之因其思醋為遠乞以歸得酒焉復易之往返四十里以濟其一啜病亟索浴俯見湯影即有省喜笑如脫沈痾信宿書曰三十六年顛倒今日一場好笑娘生鼻孔豁開放出無毛鐵師問如何是娘生鼻孔瓊豎起筆師曰又喚甚麼作無毛鐵瓊擲筆而逝或有問子所紀詳一而遺衆何也喬祖曰被亡而晦恐逸故書師自雙峰而至死關風勵學者入室不以時每見一期將終上堂誨示諄諄甚至繼以悲泣平居誨人世出世法皆懇懇切至軟語咄咄和易如坐春風中使人醉心悅服咸自謂得師意及至室中握三尺黑蚖鞭笞四海龍象則絲毫無少容借來者如登萬仞山而躋冰崖雪磴進無所依退無所據莫不凜然失其所執設有不顧性命強爭鋒者師必據其案欵盡底搜詰破石驗璞刮骨見髓勘其深淺真僞定其是非與奪卸僧伽黎痛決烏藤以明正其賞罰嘗語學者曰今人負一知半解所以不能了徹此事者病在甚處只為坐在不疑之地自謂千七百則公案不消一喝坐却曲彔牀子及乎被參徒下一喝則不能辨其邪正往往一句來一句去如小兒相撲伎倆相角蓋是從前得處莽鹵故也直須參到大徹之地親見親證明得差別智方能勘辨得人方能殺活得人此是喫折腳鐺中飯底工夫做到未易以口舌爭勝負也假如兩人從門外來未見其面同時下一喝且道那一箇有眼那一箇無眼那一箇深那一箇淺還辨得出麼師之機用不可湊泊下語少所許可其門戶險絶如此復念今時學者不能以戒自律縱有妙語亦難取信於人乃有毗尼方便之設焉師寓南竺日嘗誤踏一筍取而食之其後賣衣告償析薪擘果見蟲復全而置之濾水囊終身不廢師之細行涅南山之竹莫能殫姑舉是數端以識其梗槩使後之欲見師而不可得者覽斯文亦足以景仰遺風於萬一云耳良渚信土全從進得師所翦髮盛以香奩朝夕供禮一旦光明遍室視奩中舍利纍纍如貫珠師隱山前後三十年為己為人惟其一出於真實故天下之人若僧若俗若智若愚上而公卿士夫下及走卒兒童識與不識知與不知皆合手加額曰高峰古佛天下大善知識也喬祖自師至西峰即往參覲歲或十餘往往必留旬浹承教詔警䇿者至矣示本分鉗鎚外時以孔孟老莊微言要旨立難問而啓迪之益見師隨機設化之方也師未嘗握管今語録中有一二偈讚十數頌古皆雙峰時所作為弟子竊記者乃若示徒之語一句一字皆前所謂踐履真實中流出假言以顯道而已師貌清古體修律常俯首而坐非問道不答聞說人過則首愈低久病癯甚坡翁省夫禪師病有云瑟瑟寒風露骨耽耽老虎垂頭殆為師傳神也十數年間兩處成道場而未嘗過目少干懷焉喬祖從師游最久交諸耆舊最多故知師之出處言行最詳師之徒弟明初以掇集之事見囑不敢以才譾辭敬焚香滌慮拜手以述將求銘於大手筆云謹狀塔銘前朝請大夫眉山家之巽撰夫子之道不憤悱則不啓發瞿曇之道不勇猛則不精進道固未易知也古之釋子山棲林巢草衣木食死灰牆壁其身心而不悔者為一大事耳後之真能為大事者千萬人一人高峰是已師名原妙吳江徐氏子母夢癯僧而娩幼嗜趺坐稍長從嘉禾密印寺老宿法住出家習天台教不契入淨慈立死限學禪脅不席食不味見斷橋倫令參生從何來死從何去見雪巖欽令參狗子無佛性且問誰拖汝死尸來應聲即棒嘗疑萬法歸一一歸何處見雙徑五祖真讚疑始泮從欽南明欽申前問師喝欽拈杖師把住云今日打某甲不得拂袖徑出翌旦欽又問萬法歸一話師云狗䑛熱油鐺自此當機不遜尋過雪竇見西江謀希叟曇復從欽霅之道場欽時居立僧與偕赴天寧欲浼以事掩耳不顧欽嘗問日間浩浩作得主麼師云作得主夢中何如云作得主正睡著時無夢想見聞主在甚處師無語欽囑云從今不責汝學佛學法只飢飯困眠才覺抖擻精神看此際主人翁竟何在師益警省咸淳丙寅冬入龍鬚山臥薪飯松風鏖日摶誓欲一著子明白越五載中夜推枕墮地有聲廓然大悟會積雪路絶數日人謂師已矣雪霽宴坐如初甲戌遷武康雙髻峰德祐丙子春大兵至師絶食兼旬危坐不動事定戶屨紛至己卯春避入西天目之師子嚴即石洞營小室丈許榜曰死關悉屏給侍服用破甕為鐺併日一食洞梯山以升弟子罕面共築師子院以居有三關語示衆云大徹底人本脫生死因甚命根不斷佛祖公案只是一箇道理因甚有明與不明大修行人當遵佛行因甚不守毗尼弗契即拒戶不納會欽寄竹篦拂子法語瓣香拈出道價日隆遠方異域問道踵接運副鶴沙瞿君霆發敬慕師一見機契即捨田莊為供師辭不受君捨心益堅俾其徒以田別建一剎食卜蓮華距巖可十里請於官扁大覺禪寺以祖雍攝寺事乙未子月二十七日師忽書二真軸以後事囑明初祖雍臘朔上堂云西峰三十年妄談般若罪犯彌天末後一句不敢纍及平人自領去也大衆還有知落處者麼良久云毫釐有差天地懸隔別書偈云來不入死關去不出死關鐵蛇鑽入海撞倒須彌山泊然而逝庚申奉遺命全歸死關師嘉熙戊戌三月二十三日生壽五十八臘四十三弟子百人受戒請益者萬數遠近奔赴燃香臂頂慟哭填咽師清明枯淡篤志求道頓悟之後屏居窮山跬步不出內心無喘外息諸緣欣然自得為人至慈勤懇誨人善語和易或繼以泣及至室中行祖令鞭䇿龍象盡情勘核絲粟無貸嘗戒學者今人負一知半解不能了徹參徒一詰茫然莫辨邪正句來句去如手搏兒蓋得處鹵莽故也直須大徹親見親證明得差別智方解勘辨殺活機用嶮峻不可湊泊如此尤矜細行崇戒律雖創兩剎目未嘗覩師行解真實名震江湖識與不識皆手額讚歎曰古佛善知識也余弱冠從無準翁游師準孫也創院立莊兩囑以記心降久矣諸徒持事狀求銘烏得辭銘曰高峰屹立祖孫一律妙年求道力久真積空山夜澄撲地枕聲玄關劃開宇宙斬新萬法歸一一歸何處熱油一句大地起舞西峰死扄餘三十齡雲包雪笠朋來於門一絲不挂萬仞如壁近不可泊遠不可即斷衲子命了佛祖心手抉重雲霽月千林鐵蛇入海虗空百碎我作銘詩無在不在音釋愒丘蓋切音慨貪也怏倚兩切鴦上聲情不滿足也慤無約切音却行見中外曰慤憧昌中切音充行不絶貌掐苦洽切嵌入聲爪刺轄胡八切間入聲車軸頭鐵迤邐音駝里行貌又連接也姥莫補切音母老母也譾子淺切音翦淺也霅悉合切音靸溪名塍音成田中畦埒也扃涓熒切音駉外閉之關也鐍居月切音決環有舌者鏖於刀切奧平聲鏖戰盡死殺人曰鏖屨居御切音踞革履癯求於切音渠瘦也瘳丑鳩切音抽病愈也睫即涉切音接目旁毛也殫都艱切音單盡也竭也跬苦猥切窺上聲半步也
