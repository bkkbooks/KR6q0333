body:
  text: 元高峰大師語錄序始予乍閱內典得經論并古今雜著共數帙中有大師語驚喜信受如闇逢炬至於今猶然蓋自來參究此事最極精銳無逾師者真似純鋼鑄就一回展讀一回激發人意氣俾踊躍淬礪忘倦雖悟處深玄不敢以凡臆窺測而但覺其直截根原脫落窠臼近有慈明妙喜之風遠之不下德山臨濟諸老偉哉堂堂乎可謂照末法之光明幢也獨恨大藏未收坊刻尚尠怏怏於胸中者三十年乃今以其舊本重壽諸梓而蓮社行人有相顧耳語者謂予旋轉萬流指歸淨土柰何復殷勤稱讚是編意者念阿彌陀佛不及看萬法歸一耶遂洶洶搖動嗟乎但了念佛是誰不必問一歸何處茲有人焉知生我是父又自疑身從何來聞者寧不絕倒古尊宿云如人涉遠以到為期不取途中強分難易諸仁者方便門多歸元路一願勿以狐疑玩愒歲時便應直往趨為到家計既到家已千丈巖七寶池有智主人二俱不受萬歷二十七年歲次己亥佛歡喜日雲棲袾宏謹識
